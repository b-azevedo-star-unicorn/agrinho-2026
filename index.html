<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Radar | Hub de Gestão Agrícola</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Outfit:wght@300;600&display=swap');

        :root {
            --primary: #00f5d4;
            --secondary: #00b4d8;
            --bg: #0b090a;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 245, 212, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 180, 216, 0.15) 0%, transparent 40%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 245, 212, 0.3));
        }

        p {
            color: #ccc;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .hub-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1000px;
            width: 90%;
        }

        .hub-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .hub-card:hover {
            transform: translateY(-15px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .hub-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .hub-card:hover::before {
            left: 100%;
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            display: block;
        }

        .hub-card h2 {
            margin: 10px 0;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.5rem;
        }

        .hub-card span {
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 800px) {
            .hub-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>BIO-RADAR</h1>
        <p>ECOSSISTEMA DE INTELIGÊNCIA RURAL</p>
    </header>

    <div class="hub-container">
        <a href="aquaguard.html" class="hub-card">
            <span class="icon">💧</span>
            <span>Gestão Hídrica</span>
            <h2>AquaGuard</h2>
        </a>

        <a href="climate.html" class="hub-card">
            <span class="icon">☁️</span>
            <span>Meteorologia</span>
            <h2>Climate AI</h2>
        </a>

        <a href="#" class="hub-card">
            <span class="icon">🥽</span>
            <span>Imersão 360°</span>
            <h2>Explorar VR</h2>
        </a>
    </div>

</body>
</html>
