<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaGuard Hub | Gestão Agrícola</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Outfit:wght@300;600&display=swap');

        :root {
            --primary: #00f5d4;
            --accent: #00b4d8;
            --bg: #000814;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Se você tiver o vídeo, ele rodará ao fundo aqui */
            background: linear-gradient(135deg, #000814 0%, #023e8a 100%);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 90%;
            max-width: 1100px;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 4.5rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 50px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        @media (max-width: 850px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 45px 20px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(0, 245, 212, 0.2);
        }

        .card i {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .card h2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
            margin: 10px 0;
        }

        .card p {
            font-size: 0.9rem;
            color: #aaa;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="content">
        <header>
            <h1>AquaGuard</h1>
            <div class="subtitle">Smart Farming Solutions</div>
        </header>

        <div class="grid">
            <a href="aquaguard.html" class="card">
                <i>💧</i>
                <h2>AquaGuard</h2>
                <p>Gestão Hídrica & Tanques</p>
            </a>

            <a href="climate.html" class="card">
                <i>☁️</i>
                <h2>Climate AI</h2>
                <p>Previsão & Sensores Ar</p>
            </a>

            <a href="#" class="card">
                <i>🥽</i>
                <h2>BioVR 360</h2>
                <p>Tour Virtual na Fazenda</p>
            </a>
        </div>
    </div>

</body>
</html>
