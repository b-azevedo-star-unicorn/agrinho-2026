<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastro Verde | Blockchain Agrinho</title>
    <style>
        :root {
            --tech-blue: #0077b6;
            --clean-white: #ffffff;
            --light-gray: #f8f9fa;
            --text-main: #2b2d42;
            --success: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light-gray);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            width: 100%;
            padding: 15px;
            background: var(--clean-white);
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .back-link {
            text-decoration: none;
            color: var(--tech-blue);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .container {
            max-width: 800px;
            width: 90%;
            padding: 40px 0;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--tech-blue); font-weight: 300; margin: 0; }
        header b { font-weight: 800; }

        .blockchain-card {
            background: var(--clean-white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .input-section h3 { font-size: 1.1rem; color: var(--tech-blue); margin-top: 0; }
        
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fafafa;
        }

        /* QR CODE SIMULADO */
        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #eee;
            padding-left: 20px;
        }

        .qr-placeholder {
            width: 180px;
            height: 180px;
            background: #fff;
            border: 10px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Desenho do QR Code via CSS */
        .qr-code-pixels {
            width: 140px;
            height: 140px;
            background-image: radial-gradient(var(--text-main) 2px, transparent 2px);
            background-size: 10px 10px;
        }

        .status-badge {
            margin-top: 15px;
            background: var(--success);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .id-lote {
            margin-top: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            color: #aaa;
        }

        /* Texto que encolhe */
        .id-display-container {
            width: 100%;
            text-align: center;
            overflow: hidden;
            margin-top: 5px;
        }

        #id-texto {
            font-weight: bold;
            white-space: nowrap;
            font-size: 1.2rem;
            color: var(--tech-blue);
        }

        .btn-gerar {
            width: 100%;
            background: var(--tech-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-link">← VOLTAR AO HUB</a>
        <span style="font-size: 0.8rem; color: #888;">PROTOCOLO DE SEGURANÇA ALIMENTAR</span>
    </nav>

    <div class="container">
        <header>
            <h1>RASTRO<b>VERDE</b></h1>
            <p>Certificação Blockchain de Origem Sustentável</p>
        </header>

        <div class="blockchain-card">
            <div class="input-section">
                <h3>Registro de Lote</h3>
                <div class="field">
                    <label>Produto</label>
                    <select id="produto" onchange="gerarHash()">
                        <option value="SOJ">Soja Orgânica</option>
                        <option value="MIL">Milho Sustentável</option>
                        <option value="TRI">Trigo Premium</option>
                        <option value="FEI">Feijão Agroecológico</option>
                    </select>
                </div>
                <div class="field">
                    <label>Safra</label>
                    <input type="text" id="safra" value="2025/2026" oninput="gerarHash()">
                </div>
                <div class="field">
                    <label>Número do Lote</label>
                    <input type="number" id="lote_num" value="1052" oninput="gerarHash()">
                </div>
                <button class="btn-gerar" onclick="alert('Certificado Blockchain Registrado com Sucesso!')">REGISTRAR NA REDE</button>
            </div>

            <div class="qr-section">
                <div class="qr-placeholder">
                    <div class="qr-code-pixels"></div>
                </div>
                <div class="status-badge">AUTENTICADO</div>
                
                <div class="id-display-container">
                    <div id="id-texto">HASH-000000</div>
                </div>
                <div class="id-lote">VERIFICADO VIA BLOCKCHAIN</div>
            </div>
        </div>
    </div>

    <script>
        function gerarHash() {
            const prod = document.getElementById('produto').value;
            const safra = document.getElementById('safra').value;
            const num = document.getElementById('lote_num').value;
            
            // Simula um código hash baseado nos inputs
            const hashSimulado = (prod + "-" + safra.replace("/", "") + "-" + num).toUpperCase();
            
            const display = document.getElementById('id-texto');
            display.innerText = hashSimulado;

            ajustarFonte(display);
        }

        function ajustarFonte(el) {
            let size = 1.2; 
            el.style.fontSize = size + "rem";
            const limite = el.parentElement.offsetWidth;

            while (el.offsetWidth > limite && size > 0.5) {
                size -= 0.05;
                el.style.fontSize = size + "rem";
            }
        }

        // Gera o primeiro código ao carregar
        gerarHash();
    </script>
</body>
</html>
