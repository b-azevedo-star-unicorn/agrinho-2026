<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaGuard | Gestão de Recursos Hídricos</title>
    <style>
        :root {
            --water-blue: #0077b6;
            --crystal-blue: #ade8f4;
            --deep-navy: #03045e;
            --alert-red: #e63946;
            --bg-glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #caf0f8 0%, #90e0ef 100%);
            color: var(--deep-navy);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            padding: 20px;
            background: var(--deep-navy);
            color: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .back-btn {
            text-decoration: none;
            color: var(--crystal-blue);
            border: 1px solid var(--crystal-blue);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .back-btn:hover { background: var(--crystal-blue); color: var(--deep-navy); }

        .container {
            max-width: 1000px;
            width: 90%;
            padding: 40px 0;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2.5rem; margin: 0; color: var(--deep-navy); text-transform: uppercase; letter-spacing: 2px; }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 25px;
        }

        @media (max-width: 850px) { .dashboard { grid-template-columns: 1fr; } }

        .card {
            background: var(--bg-glass);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 119, 182, 0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* SIMULAÇÃO DE NÍVEL DE ÁGUA */
        .water-tank {
            width: 120px;
            height: 200px;
            border: 4px solid var(--deep-navy);
            border-radius: 10px 10px 20px 20px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            background: #eee;
        }

        .water-level {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, var(--water-blue), var(--crystal-blue));
            transition: height 1s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* ONDA ANIMADA */
        .water-level::after {
            content: "";
            position: absolute;
            top: -10px; left: 0; width: 100%; height: 20px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V49.75C51.56,76.72,124,77.76,191.63,65.28,248.8,54.71,282,63.74,321.39,56.44Z" fill="%23ade8f4"/></svg>');
            background-size: cover;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(0, 119, 182, 0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--water-blue); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #666; }

        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-top: 10px;
            font-family: inherit;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .safe { background: #d8f3dc; color: #1b4332; }
        .warning { background: #fee440; color: #5f0f40; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn">← VOLTAR AO HUB</a>
        <div style="font-weight: bold;">SISTEMA AQUAGUARD v4.2</div>
    </nav>

    <div class="container">
        <header>
            <h1>Monitoramento Hídrico</h1>
            <p>Controle de Nascentes e Eficiência de Irrigação</p>
        </header>

        <div class="dashboard">
            <div class="card">
                <h3>Configuração de Sensores</h3>
                <label>PONTO DE MONITORAMENTO</label>
                <select id="sensor" onchange="atualizarDados()">
                    <option value="nascente">Nascente Principal (APP)</option>
                    <option value="reservatorio">Reservatório Central</option>
                    <option value="setor_a">Irrigação Setor A (Soja)</option>
                    <option value="setor_b">Irrigação Setor B (Milho)</option>
                </select>

                <label style="margin-top: 20px; display: block;">FLUXO DE SAÍDA (L/s)</label>
                <input type="range" id="fluxo" min="10" max="100" value="75" oninput="atualizarDados()">
                
                <div style="margin-top: 30px;">
                    <small>STATUS DO RECURSO:</small><br>
                    <div id="status-tag" class="status-badge safe">DENTRO DA OUTORGA</div>
                </div>
            </div>

            <div class="card" style="text-align: center;">
                <h3 id="display-title">Nível do Reservatório</h3>
                
                <div class="water-tank">
                    <div class="water-level" id="water-fill" style="height: 75%;">
                        <span id="pct-txt">75%</span>
                    </div>
                </div>

                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="val-pureza">98%</div>
                        <div class="stat-label">Índice de Pureza</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="val-consumo">4.2k</div>
                        <div class="stat-label">m³ / dia</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function atualizarDados() {
            const sensor = document.getElementById('sensor').value;
            const fluxo = document.getElementById('fluxo').value;
            
            const fill = document.getElementById('water-fill');
            const pctTxt = document.getElementById('pct-txt');
            const title = document.getElementById('display-title');
            const statusTag = document.getElementById('status-tag');
            const valConsumo = document.getElementById('val-consumo');

            // Atualiza visual do tanque
            fill.style.height = fluxo + "%";
            pctTxt.innerText = fluxo + "%";

            // Lógica de títulos e valores simulados
            if (sensor === 'nascente') {
                title.innerText = "Nível da Nascente";
                valConsumo.innerText = (fluxo * 0.5).toFixed(1) + " L/s";
            } else if (sensor === 'reservatorio') {
                title.innerText = "Nível do Reservatório";
                valConsumo.innerText = (fluxo * 85).toFixed(0) + " m³";
            } else {
                title.innerText = "Pressão de Irrigação";
                valConsumo.innerText = (fluxo * 1.2).toFixed(1) + " bar";
            }

            // Alerta de nível crítico
            if (fluxo < 30) {
                statusTag.innerText = "ALERTA: NÍVEL CRÍTICO";
                statusTag.className = "status-badge warning";
                fill.style.background = "linear-gradient(to top, #e63946, #ffadad)";
            } else {
                statusTag.innerText = "DENTRO DA OUTORGA";
                statusTag.className = "status-badge safe";
                fill.style.background = "linear-gradient(to top, #0077b6, #ade8f4)";
            }
        }

        // Inicializa
        atualizarDados();
    </script>
</body>
</html>
