<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaGuard | Smart Water</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap');

        :root {
            --water: #00b4d8;
            --deep: #03045e;
            --foam: #caf0f8;
            --sand: #ffddd2;
        }

        body {
            font-family: 'Fredoka', sans-serif; /* Fonte mais arredondada e amigável */
            background: linear-gradient(180deg, #0077b6 0%, #03045e 100%);
            color: white;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ANIMAÇÃO DE BOLHAS */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            bottom: -50px;
            animation: rise 10s infinite ease-in;
            z-index: 0;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        nav {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            display: flex;
            justify-content: space-around;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 10;
        }

        .back-btn {
            text-decoration: none;
            color: var(--foam);
            border: 2px solid var(--foam);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 4rem;
            text-align: center;
            margin: 0;
            color: var(--foam);
            text-shadow: 4px 4px 0px var(--water);
            letter-spacing: 2px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        /* O TANQUE DE ÁGUA ESTILIZADO */
        .tank-container {
            width: 150px;
            height: 250px;
            background: rgba(255, 255, 255, 0.1);
            border: 5px solid var(--foam);
            border-radius: 20px 20px 40px 40px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.5);
        }

        .water {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(180deg, var(--foam) 0%, var(--water) 100%);
            transition: height 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* ONDA NO TOPO DA ÁGUA */
        .wave {
            position: absolute;
            top: -15px;
            left: 0;
            width: 200%;
            height: 20px;
            background: var(--foam);
            border-radius: 40%;
            animation: wave-move 3s infinite linear;
        }

        @keyframes wave-move {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        select, input[type="range"] {
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            border: none;
            margin-top: 10px;
            font-family: inherit;
            font-size: 1rem;
        }

        .btn-action {
            background: var(--foam);
            color: var(--deep);
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .btn-action:hover { transform: scale(1.1); }

        .info-pill {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 15px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .label-pill { color: var(--water); font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="bubbles-container"></div>

    <nav>
        <a href="index.html" class="back-btn">← SAIR DA ÁGUA</a>
        <div style="font-weight: bold;">AQUAGUARD 2.0</div>
    </nav>

    <div class="container">
        <header>
            <h1>AquaGuard</h1>
            <p>Monitoramento e Inteligência Hídrica</p>
        </header>

        <div class="dashboard">
            <div class="card">
                <h2>🌊 Controles</h2>
                <div style="text-align: left;">
                    <label>📍 Selecionar Área:</label>
                    <select id="setor" onchange="atualizar()">
                        <option value="nascente">Nascente das Pedras</option>
                        <option value="reservatorio">Tanque de Peixes</option>
                        <option value="irrigacao">Pivô Central (Soja)</option>
                        <option value="estufa">Hidroponia</option>
                    </select>

                    <label style="margin-top: 20px; display: block;">💧 Fluxo de Entrada:</label>
                    <input type="range" id="volume" min="5" max="100" value="60" oninput="atualizar()">
                </div>

                <div class="info-pill">
                    <span class="label-pill">SOLO:</span>
                    <span id="solo-status">Úmido</span>
                </div>
                
                <button class="btn-action" onclick="alert('Sistema de Irrigação Ativado!')">ATIVAR CHUVA</button>
            </div>

            <div class="card">
                <h2 id="titulo-tanque">Nível do Tanque</h2>
                <div class="tank-container">
                    <div class="water" id="water-fill" style="height: 60%;">
                        <div class="wave"></div>
                    </div>
                </div>
                <div style="font-size: 2rem; font-weight: bold;" id="txt-porcentagem">60%</div>
                
                <div class="dashboard" style="grid-template-columns: 1fr 1fr; margin-top: 10px; gap: 10px;">
                    <div class="info-pill" style="flex-direction: column;">
                        <span class="label-pill">PUREZA</span>
                        <span id="pureza">94%</span>
                    </div>
                    <div class="info-pill" style="flex-direction: column;">
                        <span class="label-pill">TEMP.</span>
                        <span id="temp">24°C</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // GERADOR DE BOLHAS
        const container = document.getElementById('bubbles-container');
        for (let i = 0; i < 15; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 40 + 10 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + 'vw';
            bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
            bubble.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(bubble);
        }

        function atualizar() {
            const vol = document.getElementById('volume').value;
            const setor = document.getElementById('setor').value;
            
            // Atualiza o visual da água
            document.getElementById('water-fill').style.height = vol + "%";
            document.getElementById('txt-porcentagem').innerText = vol + "%";

            // Lógica de dados por setor
            const statusSolo = document.getElementById('solo-status');
            const pureza = document.getElementById('pureza');
            const temp = document.getElementById('temp');
            const titulo = document.getElementById('titulo-tanque');

            if (vol < 20) {
                statusSolo.innerText = "Seco ⚠️";
                statusSolo.style.color = "#ff4d4d";
            } else {
                statusSolo.innerText = "Ideal ✓";
                statusSolo.style.color = "#00ff88";
            }

            if(setor === 'nascente') {
                titulo.innerText = "Fluxo da Nascente";
                pureza.innerText = "99%";
                temp.innerText = "18°C";
            } else if (setor === 'estufa') {
                titulo.innerText = "Nível Hidropônico";
                pureza.innerText = "92%";
                temp.innerText = "28°C";
            } else {
                titulo.innerText = "Nível do Reservatório";
                pureza.innerText = "94%";
                temp.innerText = "24°C";
            }
        }
    </script>
</body>
</html>
