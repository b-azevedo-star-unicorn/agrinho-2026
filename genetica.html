<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIO-GEN | SEQUENCIAMENTO SUSTENTÁVEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600;800&display=swap');

        :root {
            --bio-green: #00ff88;
            --dna-cyan: #00e1ff;
            --bg-deep: #010806;
            --glass: rgba(0, 255, 136, 0.05);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-deep); color: white;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        /* FUNDO COM GRID TECNOLÓGICO */
        body::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(var(--bio-green) 0.5px, transparent 0.5px);
            background-size: 30px 30px; opacity: 0.1; pointer-events: none;
        }

        header {
            padding: 25px 40px; border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }

        .logo { font-family: 'Outfit'; font-weight: 800; font-size: 1.5rem; color: var(--bio-green); letter-spacing: 2px; }
        .logo span { color: var(--dna-cyan); }

        main {
            display: grid; grid-template-columns: 350px 1fr 350px;
            gap: 20px; padding: 30px; height: calc(100vh - 120px);
        }

        /* PAINÉIS LATERAIS */
        .panel {
            background: rgba(5, 15, 12, 0.8); border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 15px; padding: 20px; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-size: 0.8rem; color: var(--dna-cyan); margin-bottom: 20px; border-left: 3px solid var(--bio-green); padding-left: 10px; }

        .data-item { margin-bottom: 15px; }
        .data-label { font-size: 0.65rem; color: #6a8a7a; display: block; margin-bottom: 5px; }
        .data-bar { height: 4px; background: #1a2a25; border-radius: 2px; overflow: hidden; }
        .progress { height: 100%; background: var(--bio-green); width: 0%; transition: width 0.5s; }

        /* ÁREA CENTRAL - VISUALIZADOR DNA */
        .visualizer-core {
            position: relative; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #0a201a 0%, transparent 70%);
            border-radius: 20px; overflow: hidden;
        }

        .microscope-circle {
            width: 350px; height: 350px; border: 2px solid rgba(0, 255, 136, 0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 0 50px rgba(0, 255, 136, 0.1);
        }

        /* ANIMAÇÃO DNA */
        .dna-helix { display: flex; gap: 10px; align-items: center; height: 150px; }
        .helix-strand {
            width: 6px; background: var(--dna-cyan); border-radius: 3px;
            animation: pulse DNA 1.5s infinite ease-in-out;
        }

        @keyframes pulseDNA { 0%, 100% { height: 20px; opacity: 0.3; } 50% { height: 100px; opacity: 1; } }

        /* BOTÕES E LOGS */
        .log-box { flex-grow: 1; font-size: 0.7rem; color: #8a9a95; overflow-y: auto; margin-top: 10px; }
        .btn-action {
            background: var(--bio-green); color: black; border: none; padding: 15px;
            font-family: 'Outfit'; font-weight: bold; border-radius: 8px; cursor: pointer;
            margin-top: 20px; transition: 0.3s; text-transform: uppercase;
        }
        .btn-action:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--bio-green); }
        .btn-action:disabled { background: #1a2a25; color: #4a5a55; cursor: not-allowed; }

        /* MENSAGEM FINAL */
        #final-badge {
            position: absolute; background: var(--bio-green); color: black;
            padding: 10px 20px; border-radius: 30px; font-weight: 800;
            top: 20px; display: none; animation: slideDown 0.5s forwards;
        }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">BIO<span>GEN</span></div>
        <div style="font-size: 0.7rem; opacity: 0.6;">SISTEMA DE SEQUENCIAMENTO DE SOLO V.2.6</div>
    </header>

    <main>
        <section class="panel">
            <h2>Comandos de Análise</h2>
            <div class="log-box" id="log-display">
                <div>[SISTEMA] Aguardando entrada de amostra...</div>
            </div>
            <button class="btn-action" id="start-btn" onclick="runAnalysis()">Iniciar Bioprocesso</button>
            <button class="btn-action" style="background: transparent; border: 1px solid #333; color: #555; margin-top: 10px;" onclick="window.location.href='agrovr.html'">Voltar ao Hub</button>
        </section>

        <section class="visualizer-core">
            <div id="final-badge">✓ SEQUENCIAMENTO CONCLUÍDO</div>
            <div class="microscope-circle">
                <div class="dna-helix" id="helix-ui">
                    </div>
            </div>
        </section>

        <section class="panel">
            <h2>Indicadores Genéticos</h2>
            
            <div class="data-item">
                <span class="data-label">PUREZA DA AMOSTRA</span>
                <div class="data-bar"><div class="progress" id="p-pureza"></div></div>
            </div>
            
            <div class="data-item">
                <span class="data-label">RESISTÊNCIA TÉRMICA</span>
                <div class="data-bar"><div class="progress" id="p-resistencia"></div></div>
            </div>

            <div class="data-item">
                <span class="data-label">POTENCIAL NUTRICIONAL</span>
                <div class="data-bar"><div class="progress" id="p-nutri"></div></div>
            </div>

            <div style="margin-top: auto; background: rgba(0,255,136,0.1); padding: 15px; border-radius: 10px;">
                <div style="font-size: 0.6rem; color: var(--bio-green);">RECOMENDAÇÃO:</div>
                <div id="recom-text" style="font-size: 0.75rem; margin-top: 5px;">Aguardando processamento de dados...</div>
            </div>
        </section>
    </main>

    <script>
        const helix = document.getElementById('helix-ui');
        const log = document.getElementById('log-display');

        // Criar as fibras do DNA
        for(let i=0; i<12; i++) {
            const strand = document.createElement('div');
            strand.className = 'helix-strand';
            strand.style.animationDelay = (i * 0.1) + 's';
            helix.appendChild(strand);
        }

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `<span style="color:var(--bio-green)">[OK]</span> ${msg}`;
            div.style.marginBottom = '5px';
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function runAnalysis() {
            document.getElementById('start-btn').disabled = true;
            addLog("Extraindo DNA da amostra...");

            let step = 0;
            const interval = setInterval(() => {
                step++;

                if(step === 20) {
                    addLog("Mapeando cadeias nitrogenadas...");
                    document.getElementById('p-pureza').style.width = '85%';
                }
                if(step === 50) {
                    addLog("Analisando microbioma do solo...");
                    document.getElementById('p-resistencia').style.width = '92%';
                }
                if(step === 80) {
                    addLog("Calculando eficiência de nitrogênio...");
                    document.getElementById('p-nutri').style.width = '98%';
                }

                if(step >= 100) {
                    clearInterval(interval);
                    finish();
                }
            }, 50);
        }

        function finish() {
            document.getElementById('final-badge').style.display = 'block';
            document.getElementById('recom-text').innerText = "Trajeto realizado com sucesso. Solo ideal para plantio de soja orgânica.";
            addLog("Análise finalizada. Relatório gerado.");
            
            // Efeito visual final nas fibras
            document.querySelectorAll('.helix-strand').forEach(s => {
                s.style.background = 'var(--bio-green)';
                s.style.boxShadow = '0 0 15px var(--bio-green)';
            });
        }
    </script>
</body>
</html>
