<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Pilot Infinity | SustentaAgro VR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #051005; color: #00ff88;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        /* MAPA INFINITO - AGORA COM IMAGEM REAL DE PLANTAÇÃO */
        #feed {
            position: fixed; 
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            /* Imagem de plantação de soja/milho vista de cima */
            background-image: url('https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&q=80&w=1000');
            background-repeat: repeat;
            background-size: 800px; /* Tamanho da textura para parecer escala de drone */
            z-index: 1;
            transition: background-position 0.1s linear, transform 0.2s ease-out;
            filter: saturate(1.3) brightness(0.9);
        }

        /* HUD E ELEMENTOS FIXOS */
        .hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: 30px solid transparent;
            border-image: radial-gradient(circle, transparent 60%, rgba(0, 255, 136, 0.15) 100%) 30;
            box-sizing: border-box; z-index: 10; pointer-events: none;
        }

        .crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 140px; height: 140px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 15;
        }
        .crosshair::before { content: ''; position: absolute; top: 50%; left: -40px; width: 220px; height: 1px; background: #00ff88; opacity: 0.3; }
        .crosshair::after { content: ''; position: absolute; left: 50%; top: -40px; width: 1px; height: 220px; background: #00ff88; opacity: 0.3; }

        .panel {
            position: absolute; background: rgba(0, 0, 0, 0.85);
            padding: 20px; border: 1px solid #00ff88;
            backdrop-filter: blur(10px); z-index: 20;
        }

        .left-panel { top: 40px; left: 40px; width: 220px; border-radius: 0 20px 20px 20px; }
        .right-panel { top: 40px; right: 40px; width: 260px; border-radius: 20px 0 20px 20px; }
        
        .controls-help {
            position: absolute; bottom: 120px; right: 40px;
            font-size: 0.7rem; color: #00ff88;
            background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #00ff88;
        }

        .bottom-panel { 
            bottom: 40px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 40px; padding: 10px 40px; border-radius: 50px;
        }

        h2 { font-family: 'Outfit'; margin: 0 0 10px 0; font-size: 0.9rem; text-transform: uppercase; color: #fff; letter-spacing: 2px; }
        .stat { margin-bottom: 8px; font-size: 0.75rem; }
        .stat-val { color: #fff; float: right; font-weight: bold; }

        .scanner-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: #00ff88; box-shadow: 0 0 30px #00ff88;
            z-index: 12; animation: scan 3s linear infinite; display: none;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .btn {
            background: #00ff88; color: #000; border: none; padding: 12px;
            font-weight: bold; cursor: pointer; width: 100%; font-family: 'JetBrains Mono';
            margin-top: 10px; text-transform: uppercase;
        }
        .btn:hover { background: #fff; }

        .back-btn {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #fff; text-decoration: none; font-size: 0.7rem; border: 1px solid rgba(255,255,255,0.5);
            padding: 8px 20px; border-radius: 20px; z-index: 100;
        }
    </style>
</head>
<body>

    <a href="agrovr.html" class="back-btn">RETURN TO BASE</a>
    <div class="scanner-line" id="scanner"></div>
    
    <div id="feed"></div>
    
    <div class="hud-overlay"></div>
    <div class="crosshair"></div>

    <div class="panel left-panel">
        <h2>Telemetry</h2>
        <div class="stat">ALTITUDE: <span class="stat-val" id="alt">50m</span></div>
        <div class="stat">SPEED: <span class="stat-val" id="vel">0km/h</span></div>
        <div class="stat">BATTERY: <span class="stat-val">94%</span></div>
        <button class="btn" onclick="toggleScan()">Deep Scan</button>
    </div>

    <div class="panel right-panel">
        <h2>Field Data</h2>
        <div id="status-analise">SYSTEM READY.</div>
        <div id="results" style="display:none; margin-top: 10px; border-top: 1px solid #00ff88; padding-top: 10px;">
            <div class="stat">PLANT HEALTH: <span class="stat-val">98%</span></div>
            <div class="stat">NITROGEN: <span class="stat-val">OPTIMAL</span></div>
            <div class="stat">PESTS: <span class="stat-val" style="color:#ffbe0b">NONE</span></div>
        </div>
    </div>

    <div class="controls-help">
        ARROWS: Fly | W: Up | S: Down
    </div>

    <div class="panel bottom-panel">
        <div class="stat">X: <span id="pos-x">0</span></div>
        <div class="stat">Y: <span id="pos-y">0</span></div>
        <div class="stat">MODE: <span style="color:#00ff88">MANUAL_FLIGHT</span></div>
    </div>

    <script>
        const feed = document.getElementById('feed');
        const scanner = document.getElementById('scanner');
        const statusAnalise = document.getElementById('status-analise');
        const results = document.getElementById('results');

        let posX = 0;
        let posY = 0;
        let zoom = 1;
        let altitude = 50;

        // Controle de Voo
        document.addEventListener('keydown', (e) => {
            const step = 40; // Sensibilidade do movimento
            
            switch(e.key) {
                case "ArrowUp":    posY += step; break;
                case "ArrowDown":  posY -= step; break;
                case "ArrowLeft":  posX += step; break;
                case "ArrowRight": posX -= step; break;
                case "w": case "W": 
                    if(zoom < 2) { zoom += 0.05; altitude += 2; } 
                    break;
                case "s": case "S": 
                    if(zoom > 0.5) { zoom -= 0.05; altitude -= 2; } 
                    break;
            }
            updateFlight();
        });

        function updateFlight() {
            // Move o background da imagem de plantação
            feed.style.backgroundPosition = `${posX}px ${posY}px`;
            // Aplica o zoom (W/S)
            feed.style.transform = `scale(${zoom})`;
            
            document.getElementById('alt').innerText = altitude + "m";
            document.getElementById('vel').innerText = "42km/h";
            document.getElementById('pos-x').innerText = Math.floor(posX);
            document.getElementById('pos-y').innerText = Math.floor(posY);
            
            // Simula desaceleração
            clearTimeout(window.velTimeout);
            window.velTimeout = setTimeout(() => {
                document.getElementById('vel').innerText = "0km/h";
            }, 300);
        }

        function toggleScan() {
            if (scanner.style.display === 'block') {
                scanner.style.display = 'none';
                statusAnalise.innerText = "SYSTEM READY.";
                results.style.display = 'none';
            } else {
                scanner.style.display = 'block';
                statusAnalise.innerHTML = "<span style='color:#00ff88'>SCANNING BIOMASS...</span>";
                setTimeout(() => {
                    statusAnalise.innerHTML = "ANALYSIS COMPLETE.";
                    results.style.display = 'block';
                }, 2000);
            }
        }
    </script>
</body>
</html>
