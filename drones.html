<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Pilot | Soja Precision</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #2a3d1a; /* Tom de verde soja para segurança */
            color: #00ff88;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        /* O MAPA DE SOJA INFINITO */
        #drone-view {
            position: fixed; 
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            /* Usando a imagem de soja pura que você aprovou */
            background-image: url('https://files.catbox.moe/p8s996.jpg'); 
            background-repeat: repeat;
            background-size: 800px; /* Tamanho ajustado para realismo */
            z-index: 1;
            /* Filtro leve para uniformizar ainda mais os tons */
            filter: saturate(1.1) brightness(0.8);
            transition: transform 0.2s ease-out;
        }

        /* SOBREPOSIÇÃO DE INTERFACE (HUD) */
        .hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: 20px solid transparent;
            border-image: radial-gradient(circle, transparent 70%, rgba(0, 255, 136, 0.2) 100%) 20;
            z-index: 10; pointer-events: none;
        }

        .crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 180px; height: 180px;
            border: 1px solid rgba(0, 255, 136, 0.4);
            transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 15;
        }
        .crosshair::before { content: ''; position: absolute; top: 50%; left: -50px; width: 280px; height: 1px; background: #00ff88; opacity: 0.3; }
        .crosshair::after { content: ''; position: absolute; left: 50%; top: -50px; width: 1px; height: 260px; background: #00ff88; opacity: 0.3; }

        /* PAINÉIS */
        .panel {
            position: absolute; background: rgba(0, 20, 0, 0.8);
            padding: 20px; border: 1px solid #00ff88;
            backdrop-filter: blur(10px); z-index: 20;
        }

        .left-panel { top: 40px; left: 40px; width: 220px; border-radius: 0 15px 15px 15px; }
        .right-panel { top: 40px; right: 40px; width: 260px; border-radius: 15px 0 15px 15px; }
        .bottom-panel { bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; padding: 12px 40px; border-radius: 50px; }

        h2 { font-family: 'Outfit'; margin: 0 0 10px 0; font-size: 0.9rem; text-transform: uppercase; color: #fff; letter-spacing: 2px; }
        .stat { margin-bottom: 8px; font-size: 0.75rem; }
        .stat-val { color: #fff; float: right; font-weight: bold; }

        .back-btn {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #fff; text-decoration: none; font-size: 0.7rem; border: 1px solid #00ff88;
            padding: 8px 20px; border-radius: 20px; z-index: 100; background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <a href="agrovr.html" class="back-btn">RETURN TO BASE</a>
    
    <div id="drone-view"></div>
    
    <div class="hud-overlay"></div>
    <div class="crosshair"></div>

    <div class="panel left-panel">
        <h2>Telemetry</h2>
        <div class="stat">ALTITUDE: <span class="stat-val" id="alt">50m</span></div>
        <div class="stat">SPEED: <span class="stat-val" id="vel">0km/h</span></div>
        <div class="stat">SIGNAL: <span class="stat-val" style="color:#00ff88">4/4</span></div>
    </div>

    <div class="panel right-panel">
        <h2>Crop Analysis</h2>
        <div style="font-size: 0.7rem; color: #aaa;">SCANNER: <span style="color:#00ff88">ACTIVE</span></div>
        <div id="results" style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #333;">
            <div class="stat">NDVI: <span class="stat-val">0.85</span></div>
            <div class="stat">MOISTURE: <span class="stat-val">22%</span></div>
        </div>
    </div>

    <div class="panel bottom-panel">
        <div class="stat">X: <span id="pos-x">0</span></div>
        <div class="stat">Y: <span id="pos-y">0</span></div>
        <div class="stat">PILOT: <span style="color:#00ff88">MANUAL</span></div>
    </div>

    <script>
        const droneView = document.getElementById('drone-view');
        let posX = 0;
        let posY = 0;
        let zoom = 1;
        let altitude = 50;

        // Controle de Voo
        document.addEventListener('keydown', (e) => {
            const step = 35; // Velocidade do movimento

            switch(e.key) {
                case "ArrowUp":    posY += step; break;
                case "ArrowDown":  posY -= step; break;
                case "ArrowLeft":  posX += step; break;
                case "ArrowRight": posX -= step; break;
                case "w": case "W": 
                    if(zoom < 2.5) { zoom += 0.1; altitude -= 2; } 
                    break;
                case "s": case "S": 
                    if(zoom > 0.6) { zoom -= 0.1; altitude += 2; } 
                    break;
            }
            updateDrone();
        });

        function updateDrone() {
            // MOVE O BACKGROUND POSITION: Isso garante o mapa infinito sem bordas pretas
            droneView.style.backgroundPosition = `${posX}px ${posY}px`;
            
            // APLICA O ZOOM (Altitude)
            droneView.style.transform = `scale(${zoom})`;

            // ATUALIZA HUD
            document.getElementById('alt').innerText = altitude + "m";
            document.getElementById('vel').innerText = "40 km/h";
            document.getElementById('pos-x').innerText = posX;
            document.getElementById('pos-y').innerText = posY;

            // Timer para zerar velocidade
            clearTimeout(window.stopTimer);
            window.stopTimer = setTimeout(() => {
                document.getElementById('vel').innerText = "0 km/h";
            }, 300);
        }
    </script>
</body>
</html>
