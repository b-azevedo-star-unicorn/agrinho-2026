<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Pilot Infinity | SustentaAgro VR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            /* Fundo de segurança caso a imagem demore, para não ficar preto */
            background: #2d3e10; 
            color: #00ff88;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        /* O MAPA INFINITO - CAMADA 1 (PLANTAÇÃO) */
        #drone-view {
            position: fixed; 
            top: -1000%; left: -1000%;
            width: 3000%; height: 3000%; /* Tamanho gigantesco para evitar bordas */
            /* Imagem de plantação aérea real */
            background-image: url('https://www.google.com/maps/vt/pb=!1m4!1m3!1i17!2i38125!3i64250!2m3!1e0!2sm!3i605151525!3m8!2spt-BR!3sUS!5e1105!12m4!1e68!2m2!1sset!2sRoadmap!4e0!5m1!1e4!23i1301875');
            background-repeat: repeat;
            background-size: 500px; 
            z-index: 1;
            filter: saturate(1.5) brightness(0.8);
            transition: transform 0.1s linear;
        }

        /* LINHAS DE GRADE DO GPS (PARA DAR REALISMO) */
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 136, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 136, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 5; pointer-events: none;
        }

        .hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: 20px solid transparent;
            border-image: radial-gradient(circle, transparent 70%, rgba(0, 255, 136, 0.2) 100%) 20;
            z-index: 10; pointer-events: none;
        }

        .crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 180px; height: 180px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 15;
        }

        .panel {
            position: absolute; background: rgba(0, 15, 0, 0.85);
            padding: 20px; border: 1px solid #00ff88;
            backdrop-filter: blur(10px); z-index: 20;
        }

        .left-panel { top: 40px; left: 40px; width: 220px; }
        .right-panel { top: 40px; right: 40px; width: 260px; }
        .bottom-panel { bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; }

        .stat-val { color: #fff; float: right; font-weight: bold; }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            color: #fff; text-decoration: none; font-size: 0.7rem; border: 1px solid #00ff88;
            padding: 8px 15px; border-radius: 5px; z-index: 100; background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <a href="agrovr.html" class="back-btn">← ABORTAR</a>
    
    <div id="drone-view"></div>
    <div class="grid-overlay"></div>
    <div class="hud-overlay"></div>
    <div class="crosshair"></div>

    <div class="panel left-panel">
        <h2>TELEMETRIA</h2>
        <div style="font-size:0.7rem; margin-bottom:10px; color:#00ff88">ID: AGR-2026</div>
        <div>ALT: <span class="stat-val" id="alt">50m</span></div>
        <div>SPD: <span class="stat-val" id="vel">0km/h</span></div>
    </div>

    <div class="panel right-panel">
        <h2>IA SCANNER</h2>
        <div style="font-size:0.75rem">STATUS: <span style="color:#00ff88">ONLINE</span></div>
        <div style="margin-top:10px; border-top:1px solid #00ff88; padding-top:10px;">
            SETOR: <span class="stat-val">B-12</span><br>
            UMIDADE: <span class="stat-val">24%</span>
        </div>
    </div>

    <div class="panel bottom-panel">
        <div>X: <span id="posx">0</span></div>
        <div>Y: <span id="posy">0</span></div>
        <div style="color:#00ff88; font-weight:bold">MODO: MANUAL</div>
    </div>

    <script>
        const view = document.getElementById('drone-view');
        let x = 0;
        let y = 0;
        let zoom = 1;
        let altitude = 50;

        document.addEventListener('keydown', (e) => {
            const step = 40;
            switch(e.key) {
                case "ArrowUp":    y += step; break;
                case "ArrowDown":  y -= step; break;
                case "ArrowLeft":  x += step; break;
                case "ArrowRight": x -= step; break;
                case "w": case "W": 
                    if(zoom < 3) { zoom += 0.1; altitude -= 2; } break;
                case "s": case "S": 
                    if(zoom > 0.5) { zoom -= 0.1; altitude += 2; } break;
            }
            updateDrone();
        });

        function updateDrone() {
            // O segredo do movimento infinito sem erro de fundo preto:
            // Aplicamos o movimento no translate para ser suave e no background-position para ser infinito
            view.style.backgroundPosition = `${x}px ${y}px`;
            view.style.transform = `scale(${zoom})`;

            document.getElementById('posx').innerText = x;
            document.getElementById('posy').innerText = y;
            document.getElementById('alt').innerText = altitude + "m";
            document.getElementById('vel').innerText = "32km/h";

            clearTimeout(window.t);
            window.t = setTimeout(() => document.getElementById('vel').innerText = "0km/h", 300);
        }
    </script>
</body>
</html>
