<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Pilot Pro | SustentaAgro VR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: #00ff88;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        /* VISTA DA FAZENDA (BACKGROUND DINÂMICO) */
        .camera-feed {
            position: fixed; 
            top: 50%; left: 50%; 
            width: 150%; height: 150%;
            background: url('https://images.unsplash.com/photo-1624720114708-0cbd6ee41f4e?auto=format&fit=crop&q=80&w=2000') no-repeat center center;
            background-size: cover;
            filter: saturate(1.1) contrast(1.1);
            z-index: 1;
            transform: translate(-50%, -50%) scale(1);
            transition: transform 0.2s cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        /* HUD OVERLAY */
        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 40px solid transparent;
            border-image: radial-gradient(circle, transparent 70%, rgba(0, 255, 136, 0.2) 100%) 40;
            box-sizing: border-box; z-index: 10; pointer-events: none;
        }

        .crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 120px; height: 120px;
            border: 1px solid rgba(0, 255, 136, 0.4);
            transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 15;
        }
        .crosshair::before { content: ''; position: absolute; top: 50%; left: -30px; width: 180px; height: 1px; background: #00ff88; opacity: 0.5; }
        .crosshair::after { content: ''; position: absolute; left: 50%; top: -30px; width: 1px; height: 180px; background: #00ff88; opacity: 0.5; }

        /* PAINÉIS */
        .panel {
            position: absolute; background: rgba(0, 0, 0, 0.8);
            padding: 20px; border: 1px solid #00ff88;
            backdrop-filter: blur(8px); z-index: 20;
        }

        .left-panel { top: 40px; left: 40px; width: 220px; }
        .right-panel { top: 40px; right: 40px; width: 260px; }
        
        /* CONTROLES HELP */
        .controls-help {
            position: absolute; bottom: 40px; right: 40px;
            font-size: 0.7rem; color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px;
        }

        .bottom-panel { bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; }

        h2 { font-family: 'Outfit'; margin: 0 0 10px 0; font-size: 0.9rem; text-transform: uppercase; color: #fff; }
        .stat { margin-bottom: 8px; font-size: 0.75rem; }
        .stat-val { color: #fff; float: right; font-weight: bold; }

        .scanner-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 3px;
            background: #00ff88; box-shadow: 0 0 20px #00ff88;
            z-index: 12; animation: scan 3s linear infinite; display: none;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        .btn {
            background: #00ff88; color: #000; border: none; padding: 12px;
            font-weight: bold; cursor: pointer; width: 100%; font-family: 'JetBrains Mono';
            margin-top: 10px; transition: 0.3s;
        }
        .btn:hover { background: #fff; box-shadow: 0 0 15px #00ff88; }

        .back-btn {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #fff; text-decoration: none; font-size: 0.7rem; border: 1px solid #fff;
            padding: 8px 20px; border-radius: 20px; z-index: 100; transition: 0.3s;
        }
        .back-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <a href="agrovr.html" class="back-btn">TERMINAR MISSÃO</a>
    <div class="scanner-line" id="scanner"></div>
    <div class="camera-feed" id="feed"></div>
    <div class="hud-overlay"></div>
    <div class="crosshair"></div>

    <div class="panel left-panel">
        <h2>Flight Telemetry</h2>
        <div class="stat">ALTITUDE: <span class="stat-val" id="alt">50m</span></div>
        <div class="stat">VELOCIDADE: <span class="stat-val" id="vel">0km/h</span></div>
        <div class="stat">SINAL: <span class="stat-val" style="color:#00ff88">FORTE</span></div>
        <button class="btn" onclick="toggleScan()">SCANNER DE PRAGAS</button>
    </div>

    <div class="panel right-panel">
        <h2>Live Analysis</h2>
        <div id="status-analise">SISTEMA OK.</div>
        <div id="results" style="display:none; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px;">
            <div class="stat">CULTURA: <span class="stat-val">SOJA</span></div>
            <div class="stat">ESTRESSE HÍDRICO: <span class="stat-val">BAIXO</span></div>
            <div class="stat">ANOMALIAS: <span class="stat-val" style="color:#ffbe0b">DETECTADAS</span></div>
        </div>
    </div>

    <div class="controls-help">
        SETAS: Mover | W: Subir | S: Descer
    </div>

    <div class="panel bottom-panel">
        <div class="stat">LAT: <span id="lat">-24.1289</span></div>
        <div class="stat">LNG: <span id="lng">-51.4122</span></div>
        <div class="stat">GPS: <span style="color:#00ff88">FIXED</span></div>
    </div>

    <script>
        const feed = document.getElementById('feed');
        const scanner = document.getElementById('scanner');
        const statusAnalise = document.getElementById('status-analise');
        const results = document.getElementById('results');

        let posX = -50;
        let posY = -50;
        let zoom = 1;
        let altitude = 50;

        // Controle de Voo por Teclado
        document.addEventListener('keydown', (e) => {
            const step = 2; // Velocidade do movimento
            
            switch(e.key) {
                case "ArrowUp":    posY += step; break;
                case "ArrowDown":  posY -= step; break;
                case "ArrowLeft":  posX += step; break;
                case "ArrowRight": posX -= step; break;
                case "w": case "W": 
                    if(zoom < 1.5) { zoom += 0.05; altitude += 1; } 
                    break;
                case "s": case "S": 
                    if(zoom > 0.8) { zoom -= 0.05; altitude -= 1; } 
                    break;
            }
            updateFlight();
        });

        function updateFlight() {
            feed.style.transform = `translate(${posX}%, ${posY}%) scale(${zoom})`;
            document.getElementById('alt').innerText = altitude + "m";
            document.getElementById('vel').innerText = "24km/h";
            
            // Coordenadas mudam conforme move
            document.getElementById('lat').innerText = (-24.1289 + (posY/5000)).toFixed(4);
            document.getElementById('lng').innerText = (-51.4122 + (posX/5000)).toFixed(4);
            
            // Resetar velocidade após parar
            clearTimeout(window.velTimeout);
            window.velTimeout = setTimeout(() => {
                document.getElementById('vel').innerText = "0km/h";
            }, 500);
        }

        function toggleScan() {
            if (scanner.style.display === 'block') {
                scanner.style.display = 'none';
                statusAnalise.innerText = "SISTEMA OK.";
                results.style.display = 'none';
            } else {
                scanner.style.display = 'block';
                statusAnalise.innerHTML = "<span style='color:#00ff88'>SCANNING...</span>";
                setTimeout(() => {
                    statusAnalise.innerHTML = "ANÁLISE COMPLETA.";
                    results.style.display = 'block';
                }, 2500);
            }
        }
    </script>
</body>
</html>
