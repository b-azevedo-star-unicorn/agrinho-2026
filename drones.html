<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Pilot Realism | SustentaAgro VR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #1a240a; 
            color: #00ff88;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        /* MAPA REALISTA E INFINITO */
        #drone-view {
            position: fixed; 
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            /* Imagem de plantação aérea real de alta qualidade */
            background-image: url('https://images.unsplash.com/photo-1594495894542-a4e1707d3932?q=80&w=2000&auto=format&fit=crop');
            background-repeat: repeat;
            background-size: 1000px; /* Ajuste para o tamanho da fazenda */
            z-index: 1;
            filter: saturate(1.2) brightness(0.8) contrast(1.1);
            transition: transform 0.2s ease-out; /* Suaviza o zoom */
        }

        /* EFEITO DE LENTE DO DRONE */
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.7) 100%);
            z-index: 5; pointer-events: none;
        }

        .hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: 20px solid transparent;
            border-image: radial-gradient(circle, transparent 75%, rgba(0, 255, 136, 0.3) 100%) 20;
            z-index: 10; pointer-events: none;
        }

        .crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 200px; height: 200px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 15;
        }

        .panel {
            position: absolute; background: rgba(0, 20, 0, 0.85);
            padding: 20px; border: 1px solid #00ff88;
            backdrop-filter: blur(10px); z-index: 20;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .left-panel { top: 40px; left: 40px; width: 220px; border-radius: 0 20px 0 0; }
        .right-panel { top: 40px; right: 40px; width: 260px; border-radius: 20px 0 0 0; }
        .bottom-panel { bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 50px; border-radius: 50px; padding: 10px 40px; }

        .stat-val { color: #fff; float: right; font-weight: bold; }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            color: #fff; text-decoration: none; font-size: 0.7rem; border: 1px solid #00ff88;
            padding: 8px 15px; border-radius: 5px; z-index: 100; background: rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <a href="agrovr.html" class="back-btn">← SAIR DO VOO</a>
    
    <div id="drone-view"></div>
    <div class="vignette"></div>
    <div class="hud-overlay"></div>
    <div class="crosshair"></div>

    <div class="panel left-panel">
        <h2>TELEMETRIA</h2>
        <div>ALTITUDE: <span class="stat-val" id="alt">50m</span></div>
        <div>SPD: <span class="stat-val" id="vel">0km/h</span></div>
        <div>GPS: <span class="stat-val" style="color:#00ff88">FIXED</span></div>
    </div>

    <div class="panel right-panel">
        <h2>IA SCANNER</h2>
        <div style="font-size:0.7rem; color:#00ff88">ANALISANDO BIOMASSA...</div>
        <div style="margin-top:10px; border-top:1px solid #333; padding-top:10px;">
            CULTURA: <span class="stat-val">MILHO/SOJA</span><br>
            SAÚDE: <span class="stat-val" style="color:#00ff88">EXCELENTE</span>
        </div>
    </div>

    <div class="panel bottom-panel">
        <div>X: <span id="posx">0</span></div>
        <div>Y: <span id="posy">0</span></div>
        <div style="color:#00ff88; font-weight:bold">PILOTO: MANUAL</div>
    </div>

    <script>
        const view = document.getElementById('drone-view');
        let x = 0;
        let y = 0;
        let zoom = 1;
        let altitude = 50;

        document.addEventListener('keydown', (e) => {
            const step = 45; // Velocidade do drone
            
            switch(e.key) {
                case "ArrowUp":    y += step; break;
                case "ArrowDown":  y -= step; break;
                case "ArrowLeft":  x += step; break;
                case "ArrowRight": x -= step; break;
                case "w": case "W": 
                    if(zoom < 2.5) { zoom += 0.1; altitude -= 2; } break;
                case "s": case "S": 
                    if(zoom > 0.5) { zoom -= 0.1; altitude += 2; } break;
            }
            updateDrone();
        });

        function updateDrone() {
            // O segredo do mapa infinito está aqui:
            // Movemos a posição do background em vez da DIV inteira
            view.style.backgroundPosition = `${x}px ${y}px`;
            
            // Aplica o zoom (Simulando subida/descida)
            view.style.transform = `scale(${zoom})`;

            document.getElementById('posx').innerText = x;
            document.getElementById('posy').innerText = y;
            document.getElementById('alt').innerText = altitude + "m";
            document.getElementById('vel').innerText = "42km/h";

            // Timer para zerar velocidade
            clearTimeout(window.t);
            window.t = setTimeout(() => {
                document.getElementById('vel').innerText = "0km/h";
            }, 300);
        }
    </script>
</body>
</html>
