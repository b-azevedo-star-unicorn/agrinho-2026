<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Autônomos | Central de Frota</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        :root {
            --neon-blue: #00e1ff;
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505; color: white;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        #field-container {
            position: absolute; top: 50%; left: 45%;
            width: 750px; height: 550px;
            transform: translate(-50%, -50%);
            background-image: url('Gemini_Generated_Image_y5jyp5y5jyp5y5jy.png');
            background-size: cover;
            background-position: center;
            border: 4px solid #222;
            border-radius: 8px; z-index: 2;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #gps-canvas {
            position: absolute; top: 0; left: 0;
            z-index: 5; pointer-events: none;
        }

        .unit {
            position: absolute; width: 45px; height: 60px;
            margin-left: -22.5px; margin-top: -30px;
            background: var(--neon-blue); border-radius: 4px;
            /* Ponto inicial exato */
            top: 520px; left: 20px; 
            box-shadow: 0 0 20px var(--neon-blue);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            z-index: 10;
            transform-origin: center;
        }

        .panel {
            position: absolute; background: rgba(0, 10, 15, 0.95);
            border: 1px solid var(--neon-blue); padding: 20px;
            backdrop-filter: blur(10px); z-index: 20;
        }
        .status-panel { top: 50px; right: 30px; width: 320px; }
        .log-panel { bottom: 50px; right: 30px; width: 320px; height: 220px; font-size: 0.7rem; overflow-y: auto; }
        .command-panel { bottom: 50px; left: 30px; width: 250px; }

        .btn {
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 12px; width: 100%;
            cursor: pointer; font-weight: bold; margin-bottom: 10px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn:hover:not(:disabled) { background: var(--neon-blue); color: #000; }
        .btn:disabled { border-color: #444; color: #444; }

        .log-entry { margin-bottom: 6px; padding-left: 8px; border-left: 2px solid var(--neon-blue); color: #ccc; }
    </style>
</head>
<body>

    <div id="field-container">
        <canvas id="gps-canvas" width="750" height="550"></canvas>
        <div class="unit" id="tractor">🚜</div>
    </div>

    <div class="panel status-panel">
        <h2>Unidade: TR-800 Autonomy</h2>
        <p>STATUS: <span id="mode">STANDBY</span></p>
        <p>VELOCIDADE: <span id="speed">0.0 km/h</span></p>
    </div>

    <div class="panel log-panel" id="log-box">
        <div class="log-entry">> Central pronta. Escaneie o terreno.</div>
    </div>

    <div class="panel command-panel">
        <button class="btn" id="btn-scan" onclick="escanearTrajeto()">Sincronizar GPS Suave</button>
        <button class="btn" id="btn-start" onclick="iniciarMissao()" disabled>Iniciar Missão</button>
    </div>

    <script>
        const tractor = document.getElementById('tractor');
        const canvas = document.getElementById('gps-canvas');
        const ctx = canvas.getContext('2d');
        const logBox = document.getElementById('log-box');
        
        let missionActive = false;
        let routePoints = [];

        // PONTOS DE CONTROLE - Ajustados para contornar a pedra POR CIMA e descer à ESQUERDA
        const points = [
            {x: 20, y: 520},   // Entrada
            {x: 400, y: 280},  // Diagonal central
            {x: 420, y: 130},  // Curva superior (Cume da rocha)
            {x: 630, y: 110},  // Contorno completo
            {x: 690, y: 320},  // Início da descida lateral
            {x: 600, y: 530}   // PONTO FINAL: Estrada lateral esquerda
        ];

        function addLog(text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = `> ${text}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Função para gerar curva de Catmull-Rom (Mais arredondada que Bézier comum)
        function getCurvePoints(pts, tension = 0.5, numOfSegments = 100) {
            let res = [];
            let _pts = pts.slice(0);
            _pts.unshift(pts[0]);
            _pts.push(pts[pts.length - 1]);

            for (let i = 1; i < _pts.length - 2; i++) {
                for (let t = 0; t <= numOfSegments; t++) {
                    let t1x = (_pts[i + 1].x - _pts[i - 1].x) * tension;
                    let t2x = (_pts[i + 2].x - _pts[i].x) * tension;
                    let t1y = (_pts[i + 1].y - _pts[i - 1].y) * tension;
                    let t2y = (_pts[i + 2].y - _pts[i].y) * tension;

                    let st = t / numOfSegments;
                    let c1 = 2 * Math.pow(st, 3) - 3 * Math.pow(st, 2) + 1;
                    let c2 = -(2 * Math.pow(st, 3)) + 3 * Math.pow(st, 2);
                    let c3 = Math.pow(st, 3) - 2 * Math.pow(st, 2) + st;
                    let c4 = Math.pow(st, 3) - Math.pow(st, 2);

                    res.push({
                        x: c1 * _pts[i].x + c2 * _pts[i + 1].x + c3 * t1x + c4 * t2x,
                        y: c1 * _pts[i].y + c2 * _pts[i + 1].y + c3 * t1y + c4 * t2y
                    });
                }
            }
            return res;
        }

        function escanearTrajeto() {
            routePoints = getCurvePoints(points, 0.5, 50);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(0, 225, 255, 0.8)";
            ctx.lineWidth = 6;
            ctx.setLineDash([10, 10]);
            ctx.shadowBlur = 10;
            ctx.shadowColor = "cyan";

            ctx.beginPath();
            ctx.moveTo(routePoints[0].x, routePoints[0].y);
            routePoints.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();

            addLog("Trajeto curvado e validado. GPS Sincronizado.");
            document.getElementById('btn-scan').disabled = true;
            document.getElementById('btn-start').disabled = false;
        }

        function iniciarMissao() {
            if(missionActive) return;
            missionActive = true;
            addLog("Missão iniciada. Controle de tração ativo.");
            document.getElementById('mode').innerText = "AUTÔNOMO";
            document.getElementById('speed').innerText = "5.4 km/h";

            let currentIndex = 0;
            
            function animate() {
                if (!missionActive) return;

                if (currentIndex < routePoints.length) {
                    const p = routePoints[currentIndex];
                    tractor.style.left = p.x + 'px';
                    tractor.style.top = p.y + 'px';

                    // Rotação suave baseada no próximo ponto
                    if (currentIndex < routePoints.length - 1) {
                        const next = routePoints[currentIndex + 1];
                        const angle = Math.atan2(next.y - p.y, next.x - p.x) * 180 / Math.PI;
                        tractor.style.transform = `rotate(${angle + 90}deg)`;
                    }

                    // Controle de velocidade: pular menos pontos = mais devagar
                    currentIndex += 1; 
                    requestAnimationFrame(animate);
                } else {
                    missionActive = false;
                    addLog("Unidade estacionada no destino final.");
                    document.getElementById('mode').innerText = "IDLE";
                    document.getElementById('speed').innerText = "0.0 km/h";
                }
            }

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
