<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Autônomos | Central de Frota</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        :root {
            --neon-blue: #00e1ff;
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
            --dirt-brown: #3d2b1f;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505; color: white;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        /* AMBIENTE DE CAMPO (TALHÃO) COM A IMAGEM DE FUNDO */
        #field-container {
            position: absolute; top: 50%; left: 45%;
            width: 750px; height: 550px;
            transform: translate(-50%, -50%);
            /* UTILIZANDO A IMAGEM SALVA COMO FUNDO */
            background-image: url('Gemini_Generated_Image_y5jyp5y5jyp5y5jy.png');
            background-size: cover;
            background-position: center;
            
            border: 4px solid #222;
            border-radius: 8px; z-index: 2;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* IDENTIFICAÇÃO DO OBSTÁCULO VIRTUAL - SOBREPOSTO ÀS ROCHAS DA IMAGEM */
        .obstacle-zone {
            position: absolute; 
            top: 38%; /* Ajustado para coincidir com as rochas na imagem */
            left: 58%; /* Ajustado para coincidir com as rochas na imagem */
            text-align: center; z-index: 3;
            pointer-events: none; /* Não atrapalha o clique */
        }
        
        /* Marcador visual da IA para a rocha */
        .ai-marker {
            width: 80px; height: 60px;
            border: 2px solid var(--neon-red);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.5);
            background: rgba(255, 62, 62, 0.1);
            animation: pulse 2s infinite;
        }

        .warning-label {
            font-size: 10px; color: var(--neon-red);
            background: rgba(0,0,0,0.8); padding: 2px 5px;
            border: 1px solid var(--neon-red); display: block; margin-top: 5px;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 15px rgba(255, 62, 62, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 62, 62, 0.8); border-color: #ff6b6b; }
            100% { box-shadow: 0 0 15px rgba(255, 62, 62, 0.5); }
        }

        /* UNIDADE TRATOR (🚜) */
        .unit {
            position: absolute; width: 45px; height: 60px;
            background: var(--neon-blue); border-radius: 4px;
            top: 80%; left: 10%; 
            transition: all 0s linear; /* Controlado via JS */
            box-shadow: 0 0 20px var(--neon-blue);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            z-index: 10;
        }

        /* PAINÉIS (MANTIDOS CONFORME SOLICITADO) */
        .panel {
            position: absolute; background: rgba(0, 10, 15, 0.95);
            border: 1px solid var(--neon-blue); padding: 20px;
            backdrop-filter: blur(10px); z-index: 20;
        }
        .status-panel { top: 50px; right: 30px; width: 320px; }
        .log-panel { bottom: 50px; right: 30px; width: 320px; height: 220px; font-size: 0.7rem; overflow-y: auto; }
        .command-panel { bottom: 50px; left: 30px; width: 250px; }

        h2 { font-family: 'Outfit'; font-size: 1rem; color: var(--neon-blue); margin: 0 0 15px 0; border-bottom: 1px solid; text-transform: uppercase; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; }
        .label { color: #aaa; }
        .value { color: #fff; font-weight: bold; }

        .btn {
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 12px; width: 100%;
            cursor: pointer; font-weight: bold; margin-bottom: 10px;
            font-family: 'JetBrains Mono'; text-transform: uppercase;
        }
        .btn:hover { background: var(--neon-blue); color: #000; }
        .btn-stop { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-stop:hover { background: var(--neon-red); color: white; }

        .log-entry { margin-bottom: 6px; padding-left: 8px; border-left: 2px solid var(--neon-blue); color: #ccc; }
        .back-btn { position: fixed; top: 20px; left: 20px; color: white; text-decoration: none; font-size: 0.7rem; border: 1px solid #444; padding: 10px 20px; border-radius: 30px; z-index: 100; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <a href="agrovr.html" class="back-btn">← EXIT CENTRAL</a>

    <div id="field-container">
        <div class="obstacle-zone">
            <div class="ai-marker"></div>
            <span class="warning-label">IA: ROCK_DETECTION</span>
        </div>
        
        <div class="unit" id="tractor">🚜</div>
    </div>

    <div class="panel status-panel">
        <h2>Unidade: TR-800 Autonomy</h2>
        <div class="data-row"><span class="label">STATUS:</span><span class="value" id="mode">IDLE</span></div>
        <div class="data-row"><span class="label">VELOCIDADE:</span><span class="value" id="speed">0.0 km/h</span></div>
        <div class="data-row"><span class="label">SATÉLITES:</span><span class="value">18 (FIX)</span></div>
        <div class="data-row"><span class="label">BATERIA:</span><span class="value">92%</span></div>
        <div class="data-row"><span class="label">ÁREA:</span><span class="value" id="area">0.00 ha</span></div>
    </div>

    <div class="panel log-panel" id="log-box">
        <div class="log-entry">> Sistema iniciado. Aguardando conexão...</div>
        <div class="log-entry">> Link de satélite estabelecido.</div>
    </div>

    <div class="panel command-panel">
        <h2>Operações</h2>
        <button class="btn" onclick="iniciarMissao()">Iniciar Trajeto</button>
        <button class="btn" onclick="resetUnit()">Resetar Posição</button>
        <button class="btn btn-stop" onclick="abortarMissao()">ABORTAR MISSÃO</button>
    </div>

    <script>
        const tractor = document.getElementById('tractor');
        const mode = document.getElementById('mode');
        const speed = document.getElementById('speed');
        const area = document.getElementById('area');
        const logBox = document.getElementById('log-box');
        
        let missionActive = false;
        let areaVal = 0;
        let timeoutId;

        function addLog(text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = `> ${text}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function setTractorPos(top, left, duration) {
            tractor.style.transition = `all ${duration}s linear`;
            tractor.style.top = top;
            tractor.style.left = left;
        }

        function iniciarMissao() {
            if(missionActive) return;
            missionActive = true;
            
            addLog("Iniciando motor elétrico...");
            mode.innerText = "MOVING";
            mode.style.color = "var(--neon-green)";
            speed.innerText = "7.2 km/h";

            // Fase 1: Sobe em direção ao obstáculo seguindo o trajeto na imagem
            setTractorPos("40%", "20%", 3);

            timeoutId = setTimeout(() => {
                if(!missionActive) return;
                addLog("SENSOR: Obstáculo detectado (ROCHA)");
                addLog("IA: Recalculando evasão para a direita...");
                
                // Fase 2: Desvio lateral seguindo a curva da imagem
                setTractorPos("40%", "70%", 2);

                timeoutId = setTimeout(() => {
                    if(!missionActive) return;
                    addLog("IA: Obstáculo superado. Retomando trajeto B.");
                    
                    // Fase 3: Continua subindo para o final
                    setTractorPos("10%", "80%", 3);
                    
                    timeoutId = setTimeout(() => {
                        addLog("Missão finalizada com sucesso.");
                        missionActive = false;
                        mode.innerText = "COMPLETED";
                        speed.innerText = "0.0 km/h";
                    }, 3000);
                }, 2000);
            }, 3000);

            // Contador de área
            const areaInterval = setInterval(() => {
                if(!missionActive) { clearInterval(areaInterval); return; }
                areaVal += 0.01;
                area.innerText = areaVal.toFixed(2) + " ha";
            }, 500);
        }

        function abortarMissao() {
            missionActive = false;
            clearTimeout(timeoutId);
            
            // Pega a posição atual exata para parar onde está
            const computedStyle = window.getComputedStyle(tractor);
            const stopTop = computedStyle.top;
            const stopLeft = computedStyle.left;

            // Remove a transição e fixa o trator no lugar
            tractor.style.transition = "none";
            tractor.style.top = stopTop;
            tractor.style.left = stopLeft;

            mode.innerText = "EMERGENCY STOP";
            mode.style.color = "var(--neon-red)";
            speed.innerText = "0.0 km/h";
            addLog("COMANDO: Missão abortada pelo operador.");
            addLog("ALERTA: Motores travados.");
        }

        function resetUnit() {
            missionActive = false;
            clearTimeout(timeoutId);
            tractor.style.transition = "all 0.5s ease-out";
            tractor.style.top = "80%";
            tractor.style.left = "10%";
            areaVal = 0;
            area.innerText = "0.00 ha";
            mode.innerText = "IDLE";
            mode.style.color = "white";
            speed.innerText = "0.0 km/h";
            addLog("Sistema resetado para posição inicial.");
        }
    </script>
</body>
</html>
