<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Autônomos | Central de Frota</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        :root {
            --neon-blue: #00e1ff;
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
            --bg-dark: #0a0a0c;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-dark); color: white;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        /* FUNDO COM GRID TÉCNICO */
        .grid-layer {
            position: fixed; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 225, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 225, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; z-index: 1;
        }

        /* MONITOR PRINCIPAL (MAPA) */
        #field-container {
            position: absolute; top: 50%; left: 45%;
            width: 700px; height: 500px;
            transform: translate(-50%, -50%);
            background: rgba(0, 40, 40, 0.2);
            border: 2px solid rgba(0, 225, 255, 0.2);
            border-radius: 10px; z-index: 2;
            overflow: hidden;
        }

        /* O TRATOR/MÁQUINA */
        .unit {
            position: absolute; width: 40px; height: 50px;
            background: var(--neon-blue); border-radius: 5px;
            top: 80%; left: 10%; transition: all 1s linear;
            box-shadow: 0 0 15px var(--neon-blue);
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        /* RASTRO DE TRABALHO */
        .trail {
            position: absolute; width: 40px; height: 40px;
            background: rgba(0, 255, 136, 0.2); pointer-events: none;
        }

        /* PAINÉIS LATERAIS - ONDE ESTÃO AS INFORMAÇÕES */
        .panel {
            position: absolute; background: rgba(0, 10, 15, 0.9);
            border: 1px solid var(--neon-blue); padding: 20px;
            backdrop-filter: blur(10px); z-index: 10;
        }

        /* PAINEL DE STATUS (DIREITA) */
        .status-panel { top: 50px; right: 30px; width: 320px; }

        /* PAINEL DE LOGS (DIREITA BAIXO) */
        .log-panel { bottom: 50px; right: 30px; width: 320px; height: 200px; font-size: 0.7rem; overflow-y: auto; }

        /* PAINEL DE COMANDOS (ESQUERDA BAIXO) */
        .command-panel { bottom: 50px; left: 30px; width: 250px; }

        h2 { font-family: 'Outfit'; font-size: 1rem; color: var(--neon-blue); margin: 0 0 15px 0; border-bottom: 1px solid; }

        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; }
        .label { color: #aaa; }
        .value { color: #fff; font-weight: bold; }

        .btn {
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 12px; width: 100%;
            cursor: pointer; font-weight: bold; margin-bottom: 10px;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn:hover { background: var(--neon-blue); color: #000; }
        
        .btn-stop { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-stop:hover { background: var(--neon-red); color: #fff; }

        .log-entry { margin-bottom: 5px; padding-left: 5px; border-left: 2px solid var(--neon-blue); }

        .back-btn {
            position: fixed; top: 20px; left: 20px;
            color: white; text-decoration: none; font-size: 0.7rem;
            border: 1px solid #333; padding: 10px; border-radius: 5px; z-index: 100;
        }

        /* OBSTÁCULO ANIMADO */
        .obstacle {
            position: absolute; top: 30%; left: 45%;
            width: 30px; height: 30px; background: var(--neon-red);
            border-radius: 50%; box-shadow: 0 0 20px var(--neon-red);
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="grid-layer"></div>
    <a href="agrovr.html" class="back-btn">← SAIR DA CENTRAL</a>

    <div id="field-container">
        <div class="obstacle">⚠️</div>
        <div class="unit" id="tractor">🚜</div>
    </div>

    <div class="panel status-panel">
        <h2>STATUS DA UNIDADE TR-800</h2>
        <div class="data-row">
            <span class="label">MODO DE OPERAÇÃO:</span>
            <span class="value" id="mode" style="color:var(--neon-green)">STANDBY</span>
        </div>
        <div class="data-row">
            <span class="label">VELOCIDADE:</span>
            <span class="value" id="speed">0.0 km/h</span>
        </div>
        <div class="data-row">
            <span class="label">PRECISÃO GPS:</span>
            <span class="value">RTK (2.2cm)</span>
        </div>
        <div class="data-row">
            <span class="label">COMBUSTÍVEL:</span>
            <span class="value">88%</span>
        </div>
        <div class="data-row">
            <span class="label">ÁREA TRABALHADA:</span>
            <span class="value" id="area">0.0 ha</span>
        </div>
    </div>

    <div class="panel log-panel" id="log-container">
        <div class="log-entry">[SISTEMA] Aguardando comando do operador...</div>
    </div>

    <div class="panel command-panel">
        <h2>COMANDOS</h2>
        <button class="btn" onclick="iniciarMissao()">Iniciar Semeadura</button>
        <button class="btn" onclick="retornarBase()">Retornar à Base</button>
        <button class="btn btn-stop" onclick="abortar()">ABORTAR MISSÃO</button>
    </div>

    <script>
        const tractor = document.getElementById('tractor');
        const modeText = document.getElementById('mode');
        const speedText = document.getElementById('speed');
        const areaText = document.getElementById('area');
        const logContainer = document.getElementById('log-container');
        const field = document.getElementById('field-container');

        let isRunning = false;
        let areaCovered = 0;

        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logContainer.innerHTML += `<div class="log-entry">[${time}] ${msg}</div>`;
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function dropTrail(x, y) {
            const trail = document.createElement('div');
            trail.className = 'trail';
            trail.style.left = x + 'px';
            trail.style.top = y + 'px';
            field.appendChild(trail);
        }

        function iniciarMissao() {
            if(isRunning) return;
            isRunning = true;
            
            addLog("Iniciando varredura de sensores LiDAR...");
            modeText.innerText = "CALIBRANDO";
            
            setTimeout(() => {
                addLog("Rota calculada. Iniciando trajeto autônomo.");
                modeText.innerText = "EM OPERAÇÃO";
                speedText.innerText = "8.5 km/h";
                
                // Animação de movimento
                moveStep(1);
            }, 1500);
        }

        function moveStep(step) {
            if(!isRunning) return;

            if(step === 1) {
                tractor.style.top = "30%";
                tractor.style.left = "20%";
                addLog("Executando linha A-12.");
            } else if(step === 2) {
                addLog("ALERTA: Obstáculo detectado à frente.");
                addLog("IA recalculando desvio lateral...");
                tractor.style.left = "60%";
            } else if(step === 3) {
                addLog("Retomando linha original.");
                tractor.style.top = "10%";
                tractor.style.left = "80%";
            }

            // Simula contagem de área
            areaCovered += 1.2;
            areaText.innerText = areaCovered.toFixed(1) + " ha";
            
            if(step < 3) {
                setTimeout(() => moveStep(step + 1), 3000);
            } else {
                addLog("Missão concluída com sucesso.");
                modeText.innerText = "FINALIZADO";
                speedText.innerText = "0.0 km/h";
                isRunning = false;
            }
        }

        function abortar() {
            isRunning = false;
            modeText.innerText = "INTERROMPIDO";
            modeText.style.color = "var(--neon-red)";
            speedText.innerText = "0.0 km/h";
            addLog("!!! PARADA DE EMERGÊNCIA ATIVADA !!!");
            alert("SISTEMA BLOQUEADO. Verifique a unidade TR-800.");
        }

        function retornarBase() {
            addLog("Retornando para hangar de reabastecimento...");
            tractor.style.top = "80%";
            tractor.style.left = "10%";
        }
    </script>
</body>
</html>
