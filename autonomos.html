<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Autônomos | Central de Frota</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        :root {
            --neon-blue: #00e1ff;
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505; color: white;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        #field-container {
            position: absolute; top: 50%; left: 45%;
            width: 750px; height: 550px;
            transform: translate(-50%, -50%);
            background-image: url('Gemini_Generated_Image_y5jyp5y5jyp5y5jy.png');
            background-size: cover;
            background-position: center;
            border: 4px solid #222;
            border-radius: 8px; z-index: 2;
            overflow: hidden;
        }

        #gps-canvas {
            position: absolute; top: 0; left: 0;
            z-index: 5; pointer-events: none;
        }

        .unit {
            position: absolute; width: 45px; height: 60px;
            margin-left: -22.5px; margin-top: -30px;
            background: var(--neon-blue); border-radius: 4px;
            top: 520px; left: 20px; 
            transition: transform 0.1s linear; /* Suaviza a rotação do trator */
            box-shadow: 0 0 20px var(--neon-blue);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            z-index: 10;
        }

        .panel {
            position: absolute; background: rgba(0, 10, 15, 0.95);
            border: 1px solid var(--neon-blue); padding: 20px;
            backdrop-filter: blur(10px); z-index: 20;
        }
        .status-panel { top: 50px; right: 30px; width: 320px; }
        .log-panel { bottom: 50px; right: 30px; width: 320px; height: 220px; font-size: 0.7rem; overflow-y: auto; }
        .command-panel { bottom: 50px; left: 30px; width: 250px; }

        .btn {
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 12px; width: 100%;
            cursor: pointer; font-weight: bold; margin-bottom: 10px;
            text-transform: uppercase;
        }
        .btn:hover:not(:disabled) { background: var(--neon-blue); color: #000; }
        .btn:disabled { border-color: #444; color: #444; }

        .log-entry { margin-bottom: 6px; padding-left: 8px; border-left: 2px solid var(--neon-blue); color: #ccc; }
    </style>
</head>
<body>

    <div id="field-container">
        <canvas id="gps-canvas" width="750" height="550"></canvas>
        <div class="unit" id="tractor">🚜</div>
    </div>

    <div class="panel status-panel">
        <h2>Unidade: TR-800 Autonomy</h2>
        <p>STATUS: <span id="mode">STANDBY</span></p>
    </div>

    <div class="panel log-panel" id="log-box">
        <div class="log-entry">> Central Online. Aguardando comando...</div>
    </div>

    <div class="panel command-panel">
        <button class="btn" id="btn-scan" onclick="escanearTrajeto()">Suavizar Trajeto (Bézier)</button>
        <button class="btn" id="btn-start" onclick="iniciarMissao()" disabled>Iniciar Missão</button>
    </div>

    <script>
        const tractor = document.getElementById('tractor');
        const canvas = document.getElementById('gps-canvas');
        const ctx = canvas.getContext('2d');
        const logBox = document.getElementById('log-box');
        
        let missionActive = false;
        let routePoints = []; // Guardará os pontos da curva suave

        // PONTOS DE CONTROLE PARA A CURVA (Ajustados para a estrada)
        const controlPoints = [
            {x: 20, y: 520},   // Início
            {x: 350, y: 300},  // Meio da estrada
            {x: 400, y: 100},  // Topo da rocha (Curva acentuada)
            {x: 650, y: 150},  // Contorno lateral
            {x: 700, y: 350},  // Descida suave
            {x: 580, y: 530}   // FINAL: Levemente para a esquerda
        ];

        function addLog(text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = `> ${text}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Função para desenhar curva suave (Cardinal Spline)
        function drawSmoothCurve() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(0, 225, 255, 0.9)";
            ctx.lineWidth = 8;
            ctx.lineCap = "round";
            ctx.setLineDash([15, 10]);
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#00e1ff";

            ctx.beginPath();
            ctx.moveTo(controlPoints[0].x, controlPoints[0].y);

            // Algoritmo de suavização
            for (let i = 0; i < controlPoints.length - 1; i++) {
                let p0 = controlPoints[i];
                let p1 = controlPoints[i+1];
                let cp = { x: (p0.x + p1.x) / 2, y: (p0.y + p1.y) / 2 };
                ctx.quadraticCurveTo(p0.x, p0.y, cp.x, cp.y);
                
                // Armazena pontos para o trator seguir
                for(let t=0; t<=1; t+=0.05) {
                    let tx = Math.pow(1-t, 2) * p0.x + 2 * (1-t) * t * p0.x + Math.pow(t, 2) * cp.x;
                    let ty = Math.pow(1-t, 2) * p0.y + 2 * (1-t) * t * p0.y + Math.pow(t, 2) * cp.y;
                    routePoints.push({x: tx, y: ty});
                }
            }
            ctx.lineTo(controlPoints[controlPoints.length-1].x, controlPoints[controlPoints.length-1].y);
            ctx.stroke();
        }

        function escanearTrajeto() {
            addLog("IA processando curvatura do terreno...");
            drawSmoothCurve();
            document.getElementById('btn-scan').disabled = true;
            setTimeout(() => {
                addLog("Trajeto suavizado. Pronto para navegar.");
                document.getElementById('btn-start').disabled = false;
            }, 1000);
        }

        function iniciarMissao() {
            if(missionActive) return;
            missionActive = true;
            addLog("Navegação iniciada. Mantendo alinhamento orbital.");
            document.getElementById('mode').innerText = "MOVENDO";

            let step = 0;
            const moveInterval = setInterval(() => {
                if (step < routePoints.length) {
                    const target = routePoints[step];
                    tractor.style.left = target.x + 'px';
                    tractor.style.top = target.y + 'px';
                    
                    // Pequena lógica de rotação para o trator "olhar" para onde vai
                    if (step > 0) {
                        const prev = routePoints[step - 1];
                        const angle = Math.atan2(target.y - prev.y, target.x - prev.x) * 180 / Math.PI;
                        tractor.style.transform = `rotate(${angle + 90}deg)`;
                    }
                    
                    step++;
                } else {
                    clearInterval(moveInterval);
                    addLog("Destino alcançado. Desligando sistemas.");
                    document.getElementById('mode').innerText = "FINALIZADO";
                }
            }, 50); // Velocidade do movimento
        }
    </script>
</body>
</html>
