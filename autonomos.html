<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Autônomos | Central de Frota Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        :root {
            --neon-blue: #00e1ff;
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
            --neon-yellow: #f4ea1a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #020508; color: white;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        /* CONTEINER PRINCIPAL */
        #field-container {
            position: absolute; top: 50%; left: 42%;
            width: 750px; height: 550px;
            transform: translate(-50%, -50%);
            background-image: url('Gemini_Generated_Image_y5jyp5y5jyp5y5jy.png');
            background-size: cover;
            background-position: center;
            border: 2px solid #1a2a3a;
            border-radius: 12px; z-index: 2;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 225, 255, 0.15);
        }

        #gps-canvas {
            position: absolute; top: 0; left: 0;
            z-index: 5; pointer-events: none;
        }

        /* MARCADOR DE DESTINO */
        #destination-marker {
            position: absolute;
            width: 40px; height: 40px;
            top: 510px; left: 580px; /* Alinhado ao ponto final */
            z-index: 6;
            display: none; /* Aparece após o scan */
            font-size: 24px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 5px var(--neon-green)); }
            50% { transform: translateY(-10px) scale(1.1); filter: drop-shadow(0 0 15px var(--neon-green)); }
        }

        /* UNIDADE TRATOR */
        .unit {
            position: absolute; width: 45px; height: 60px;
            margin-left: -22.5px; margin-top: -30px;
            background: var(--neon-blue); border-radius: 4px;
            top: 520px; left: 20px; 
            box-shadow: 0 0 20px var(--neon-blue);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            z-index: 10;
        }

        /* PAINÉIS DE INFORMAÇÃO */
        .panel {
            position: absolute; background: rgba(5, 12, 20, 0.9);
            border: 1px solid #1a2a3a; padding: 15px;
            backdrop-filter: blur(8px); z-index: 20;
            border-left: 4px solid var(--neon-blue);
        }

        .status-panel { top: 30px; right: 30px; width: 300px; }
        .telemetry-panel { top: 300px; right: 30px; width: 300px; }
        .log-panel { bottom: 30px; right: 30px; width: 300px; height: 180px; font-size: 0.7rem; overflow-y: auto; }
        .command-panel { bottom: 30px; left: 30px; width: 220px; }

        h2 { font-family: 'Outfit'; font-size: 0.9rem; color: var(--neon-blue); margin: 0 0 10px 0; letter-spacing: 1px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.75rem; border-bottom: 1px solid #1a2a3a; padding-bottom: 4px; }
        .label { color: #6a7a8a; }
        .value { color: #fff; font-weight: bold; }

        /* BOTÕES */
        .btn {
            background: rgba(0, 225, 255, 0.05); border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 10px; width: 100%;
            cursor: pointer; font-weight: bold; margin-bottom: 8px;
            text-transform: uppercase; font-size: 0.7rem; transition: 0.3s;
        }
        .btn:hover:not(:disabled) { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        .btn:disabled { border-color: #333; color: #555; }
        
        .log-entry { margin-bottom: 4px; padding-left: 5px; color: #8a9aaa; border-left: 1px solid #333; }
    </style>
</head>
<body>

    <div id="field-container">
        <canvas id="gps-canvas" width="750" height="550"></canvas>
        <div id="destination-marker">📍</div>
        <div class="unit" id="tractor">🚜</div>
    </div>

    <div class="panel status-panel">
        <h2>SISTEMA AUTÔNOMO</h2>
        <div class="data-row"><span class="label">ESTADO</span><span class="value" id="mode">IDLE</span></div>
        <div class="data-row"><span class="label">GPS</span><span class="value" id="gps-stat" style="color:var(--neon-red)">NO SIGNAL</span></div>
        <div class="data-row"><span class="label">PRECISÃO</span><span class="value">0.02m</span></div>
    </div>

    <div class="panel telemetry-panel">
        <h2>TELEMETRIA VITAL</h2>
        <div class="data-row"><span class="label">VELOCIDADE</span><span class="value" id="speed">0.0 km/h</span></div>
        <div class="data-row"><span class="label">TEMP. MOTOR</span><span class="value" id="temp">42°C</span></div>
        <div class="data-row"><span class="label">ÓLEO HIDRÁU.</span><span class="value">98%</span></div>
        <div class="data-row"><span class="label">ÁREA TRAB.</span><span class="value" id="area">0.00 ha</span></div>
    </div>

    <div class="panel log-panel" id="log-box">
        <div class="log-entry">> Sistemas operacionais.</div>
    </div>

    <div class="panel command-panel">
        <button class="btn" id="btn-scan" onclick="escanearTrajeto()">Sincronizar Rota</button>
        <button class="btn" id="btn-start" onclick="iniciarMissao()" disabled>Iniciar Operação</button>
        <button class="btn" onclick="location.reload()" style="border-color:#444; color:#444">Reset Geral</button>
    </div>

    <script>
        const tractor = document.getElementById('tractor');
        const canvas = document.getElementById('gps-canvas');
        const ctx = canvas.getContext('2d');
        const logBox = document.getElementById('log-box');
        const marker = document.getElementById('destination-marker');
        
        let missionActive = false;
        let routePoints = [];

        const points = [
            {x: 20, y: 520},   // Início
            {x: 400, y: 280},  // Diagonal
            {x: 420, y: 130},  // Cume da rocha
            {x: 630, y: 110},  // Contorno
            {x: 690, y: 320},  // Descida
            {x: 600, y: 530}   // Destino
        ];

        function addLog(text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = `> ${text}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Algoritmo de suavização Catmull-Rom
        function getCurvePoints(pts, tension = 0.5, numOfSegments = 60) {
            let res = [];
            let _pts = pts.slice(0);
            _pts.unshift(pts[0]);
            _pts.push(pts[pts.length - 1]);
            for (let i = 1; i < _pts.length - 2; i++) {
                for (let t = 0; t <= numOfSegments; t++) {
                    let st = t / numOfSegments;
                    let c1 = 2 * Math.pow(st, 3) - 3 * Math.pow(st, 2) + 1;
                    let c2 = -(2 * Math.pow(st, 3)) + 3 * Math.pow(st, 2);
                    let c3 = Math.pow(st, 3) - 2 * Math.pow(st, 2) + st;
                    let c4 = Math.pow(st, 3) - Math.pow(st, 2);
                    let t1x = (_pts[i + 1].x - _pts[i - 1].x) * tension;
                    let t2x = (_pts[i + 2].x - _pts[i].x) * tension;
                    let t1y = (_pts[i + 1].y - _pts[i - 1].y) * tension;
                    let t2y = (_pts[i + 2].y - _pts[i].y) * tension;
                    res.push({
                        x: c1 * _pts[i].x + c2 * _pts[i + 1].x + c3 * t1x + c4 * t2x,
                        y: c1 * _pts[i].y + c2 * _pts[i + 1].y + c3 * t1y + c4 * t2y
                    });
                }
            }
            return res;
        }

        function escanearTrajeto() {
            routePoints = getCurvePoints(points, 0.4, 40);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(0, 225, 255, 0.6)";
            ctx.lineWidth = 5;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.moveTo(routePoints[0].x, routePoints[0].y);
            routePoints.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();

            marker.style.display = 'block';
            document.getElementById('gps-stat').innerText = "SIGNAL LOCK";
            document.getElementById('gps-stat').style.color = "var(--neon-green)";
            addLog("Rota calculada. Marcador de destino fixado.");
            document.getElementById('btn-scan').disabled = true;
            document.getElementById('btn-start').disabled = false;
        }

        function iniciarMissao() {
            if(missionActive) return;
            missionActive = true;
            document.getElementById('mode').innerText = "AUTONOMOUS";
            document.getElementById('speed').innerText = "5.4 km/h";
            addLog("Motor ativo. Iniciando deslocamento.");

            let currentIndex = 0;
            let areaCount = 0;
            
            function animate() {
                if (!missionActive) return;

                if (currentIndex < routePoints.length) {
                    const p = routePoints[currentIndex];
                    tractor.style.left = p.x + 'px';
                    tractor.style.top = p.y + 'px';

                    if (currentIndex < routePoints.length - 1) {
                        const next = routePoints[currentIndex + 1];
                        const angle = Math.atan2(next.y - p.y, next.x - p.x) * 180 / Math.PI;
                        tractor.style.transform = `rotate(${angle + 90}deg)`;
                    }

                    // Atualizar telemetria falsa
                    if(currentIndex % 10 === 0) {
                        areaCount += 0.02;
                        document.getElementById('area').innerText = areaCount.toFixed(2) + " ha";
                        document.getElementById('temp').innerText = (45 + Math.random()*5).toFixed(1) + "°C";
                    }

                    currentIndex++;
                    requestAnimationFrame(animate);
                } else {
                    missionActive = false;
                    addLog("Destino alcançado. Entrando em Standby.");
                    document.getElementById('mode').innerText = "COMPLETED";
                    document.getElementById('speed').innerText = "0.0 km/h";
                    marker.innerText = "🏁"; // Muda para bandeira de chegada
                }
            }
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
