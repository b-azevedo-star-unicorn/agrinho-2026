<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Autônomos | Central de Frota</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        :root {
            --neon-blue: #00e1ff;
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505; color: white;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        #field-container {
            position: absolute; top: 50%; left: 45%;
            width: 750px; height: 550px;
            transform: translate(-50%, -50%);
            background-image: url('Gemini_Generated_Image_y5jyp5y5jyp5y5jy.png');
            background-size: cover;
            background-position: center;
            border: 4px solid #222;
            border-radius: 8px; z-index: 2;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #gps-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 5;
            pointer-events: none;
        }

        .unit {
            position: absolute; width: 45px; height: 60px;
            background: var(--neon-blue); border-radius: 4px;
            top: 85%; left: 3%; /* Início ajustado para a entrada da estrada */
            transition: all 0s linear;
            box-shadow: 0 0 20px var(--neon-blue);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            z-index: 10;
        }

        .panel {
            position: absolute; background: rgba(0, 10, 15, 0.95);
            border: 1px solid var(--neon-blue); padding: 20px;
            backdrop-filter: blur(10px); z-index: 20;
        }
        .status-panel { top: 50px; right: 30px; width: 320px; }
        .log-panel { bottom: 50px; right: 30px; width: 320px; height: 220px; font-size: 0.7rem; overflow-y: auto; }
        .command-panel { bottom: 50px; left: 30px; width: 250px; }

        h2 { font-family: 'Outfit'; font-size: 1rem; color: var(--neon-blue); margin: 0 0 15px 0; border-bottom: 1px solid; text-transform: uppercase; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; }
        .label { color: #aaa; }
        .value { color: #fff; font-weight: bold; }

        .btn {
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 12px; width: 100%;
            cursor: pointer; font-weight: bold; margin-bottom: 10px;
            font-family: 'JetBrains Mono'; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn:hover:not(:disabled) { background: var(--neon-blue); color: #000; }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        .btn-scan { border-color: var(--neon-green); color: var(--neon-green); }
        .btn-scan:hover:not(:disabled) { background: var(--neon-green); color: #000; }

        .log-entry { margin-bottom: 6px; padding-left: 8px; border-left: 2px solid var(--neon-blue); color: #ccc; }
        .back-btn { position: fixed; top: 20px; left: 20px; color: white; text-decoration: none; font-size: 0.7rem; border: 1px solid #444; padding: 10px 20px; border-radius: 30px; z-index: 100; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <a href="agrovr.html" class="back-btn">← EXIT CENTRAL</a>

    <div id="field-container">
        <canvas id="gps-canvas" width="750" height="550"></canvas>
        <div class="unit" id="tractor">🚜</div>
    </div>

    <div class="panel status-panel">
        <h2>Unidade: TR-800 Autonomy</h2>
        <div class="data-row"><span class="label">STATUS:</span><span class="value" id="mode">STANDBY</span></div>
        <div class="data-row"><span class="label">VELOCIDADE:</span><span class="value" id="speed">0.0 km/h</span></div>
        <div class="data-row"><span class="label">GPS:</span><span class="value" id="gps-stat">LOCKING...</span></div>
        <div class="data-row"><span class="label">ÁREA:</span><span class="value" id="area">0.00 ha</span></div>
    </div>

    <div class="panel log-panel" id="log-box">
        <div class="log-entry">> Central Online. Aguardando escaneamento...</div>
    </div>

    <div class="panel command-panel">
        <h2>Operações</h2>
        <button class="btn btn-scan" id="btn-scan" onclick="escanearTrajeto()">Escanear Trajeto</button>
        <button class="btn" id="btn-start" onclick="iniciarMissao()" disabled>Iniciar Missão</button>
        <button class="btn btn-stop" onclick="abortarMissao()">Abortar</button>
    </div>

    <script>
        const tractor = document.getElementById('tractor');
        const canvas = document.getElementById('gps-canvas');
        const ctx = canvas.getContext('2d');
        const logBox = document.getElementById('log-box');
        
        let missionActive = false;
        let routeScanned = false;
        let timeoutId;

        // WAYPOINTS AJUSTADOS PARA A ESTRADA NA IMAGEM (Evitando a rocha no centro)
        const waypoints = [
            {x: 50, y: 500},   // Entrada inferior esquerda
            {x: 350, y: 350},  // Meio da estrada diagonal
            {x: 600, y: 350},  // Início da curva (contornando a rocha por baixo/lado)
            {x: 680, y: 250},  // Curva fechada na direita
            {x: 630, y: 100},  // Subida final
            {x: 650, y: 20}    // Saída superior
        ];

        function addLog(text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = `> ${text}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function escanearTrajeto() {
            if(routeScanned) return;
            addLog("Mapeando estrada de terra...");
            document.getElementById('btn-scan').disabled = true;
            
            let i = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Limpa se houver algo

            const drawInterval = setInterval(() => {
                if (i < waypoints.length - 1) {
                    ctx.beginPath();
                    ctx.moveTo(waypoints[i].x, waypoints[i].y);
                    ctx.lineTo(waypoints[i+1].x, waypoints[i+1].y);
                    
                    // LINHA MAIS GROSSA E BRILHANTE
                    ctx.strokeStyle = "rgba(0, 225, 255, 0.8)";
                    ctx.lineWidth = 6; // Espessura aumentada
                    ctx.lineCap = "round";
                    ctx.setLineDash([10, 15]); // Tracejado maior
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#00e1ff";
                    ctx.stroke();
                    i++;
                } else {
                    clearInterval(drawInterval);
                    addLog("Trajeto validado. Estrada identificada.");
                    routeScanned = true;
                    document.getElementById('btn-start').disabled = false;
                    document.getElementById('gps-stat').innerText = "READY";
                    document.getElementById('gps-stat').style.color = "var(--neon-green)";
                }
            }, 500);
        }

        function setTractorPos(top, left, duration) {
            tractor.style.transition = `all ${duration}s linear`;
            tractor.style.top = top;
            tractor.style.left = left;
        }

        function iniciarMissao() {
            if(!routeScanned || missionActive) return;
            missionActive = true;
            document.getElementById('btn-start').disabled = true;
            
            addLog("Seguindo rota GPS-1...");
            document.getElementById('mode').innerText = "AUTÔNOMO";
            document.getElementById('speed').innerText = "6.5 km/h";

            // MOVIMENTOS SINCRONIZADOS COM OS WAYPOINTS (em % do container)
            // 1. Diagonal inicial
            setTractorPos("60%", "45%", 3); 

            timeoutId = setTimeout(() => {
                if(!missionActive) return;
                addLog("Realizando curva de desvio (ROCHA)...");
                // 2. Curva na direita
                setTractorPos("60%", "85%", 2); 

                timeoutId = setTimeout(() => {
                    if(!missionActive) return;
                    addLog("Subindo para saída Norte.");
                    // 3. Subida final
                    setTractorPos("5%", "82%", 4); 
                    
                    timeoutId = setTimeout(() => {
                        addLog("Trajeto finalizado.");
                        missionActive = false;
                        document.getElementById('mode').innerText = "IDLE";
                        document.getElementById('speed').innerText = "0.0 km/h";
                    }, 4000);
                }, 2000);
            }, 3000);
        }

        function abortarMissao() {
            missionActive = false;
            clearTimeout(timeoutId);
            const computedStyle = window.getComputedStyle(tractor);
            tractor.style.transition = "none";
            tractor.style.top = computedStyle.top;
            tractor.style.left = computedStyle.left;
            document.getElementById('mode').innerText = "ABORTADO";
            document.getElementById('mode').style.color = "var(--neon-red)";
            addLog("PARADA MANUAL ATIVADA.");
        }
    </script>
</body>
</html>
