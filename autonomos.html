<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas Autônomos | Central de Frota</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600&display=swap');

        :root {
            --neon-blue: #00e1ff;
            --neon-green: #00ff88;
            --neon-red: #ff3e3e;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505; color: white;
            font-family: 'JetBrains Mono', monospace; overflow: hidden;
        }

        #field-container {
            position: absolute; top: 50%; left: 45%;
            width: 750px; height: 550px;
            transform: translate(-50%, -50%);
            background-image: url('Gemini_Generated_Image_y5jyp5y5jyp5y5jy.png');
            background-size: cover;
            background-position: center;
            border: 4px solid #222;
            border-radius: 8px; z-index: 2;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #gps-canvas {
            position: absolute; top: 0; left: 0;
            z-index: 5; pointer-events: none;
        }

        .unit {
            position: absolute; width: 45px; height: 60px;
            margin-left: -22.5px; margin-top: -30px;
            background: var(--neon-blue); border-radius: 4px;
            /* Ponto inicial exato (Waypoint 0) */
            top: 520px; left: 20px; 
            transition: all 0s linear;
            box-shadow: 0 0 20px var(--neon-blue);
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            z-index: 10;
        }

        .panel {
            position: absolute; background: rgba(0, 10, 15, 0.95);
            border: 1px solid var(--neon-blue); padding: 20px;
            backdrop-filter: blur(10px); z-index: 20;
        }
        .status-panel { top: 50px; right: 30px; width: 320px; }
        .log-panel { bottom: 50px; right: 30px; width: 320px; height: 220px; font-size: 0.7rem; overflow-y: auto; }
        .command-panel { bottom: 50px; left: 30px; width: 250px; }

        h2 { font-family: 'Outfit'; font-size: 1rem; color: var(--neon-blue); margin: 0 0 15px 0; border-bottom: 1px solid; text-transform: uppercase; }
        .btn {
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 12px; width: 100%;
            cursor: pointer; font-weight: bold; margin-bottom: 10px;
            font-family: 'JetBrains Mono'; text-transform: uppercase;
        }
        .btn:hover:not(:disabled) { background: var(--neon-blue); color: #000; }
        .btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }
        .btn-scan { border-color: var(--neon-green); color: var(--neon-green); }

        .log-entry { margin-bottom: 6px; padding-left: 8px; border-left: 2px solid var(--neon-blue); color: #ccc; }
    </style>
</head>
<body>

    <div id="field-container">
        <canvas id="gps-canvas" width="750" height="550"></canvas>
        <div class="unit" id="tractor">🚜</div>
    </div>

    <div class="panel status-panel">
        <h2>Unidade: TR-800 Autonomy</h2>
        <div style="font-size: 0.8rem;">
            <p>STATUS: <span id="mode" style="color:white">STANDBY</span></p>
            <p>GPS: <span id="gps-stat" style="color:var(--neon-red)">OFFLINE</span></p>
        </div>
    </div>

    <div class="panel log-panel" id="log-box">
        <div class="log-entry">> Central iniciada. Aguardando comando...</div>
    </div>

    <div class="panel command-panel">
        <button class="btn btn-scan" id="btn-scan" onclick="escanearTrajeto()">Suavizar Trajeto</button>
        <button class="btn" id="btn-start" onclick="iniciarMissao()" disabled>Iniciar Missão</button>
        <button class="btn" onclick="location.reload()" style="border-color:#555; color:#555">Reset</button>
    </div>

    <script>
        const tractor = document.getElementById('tractor');
        const canvas = document.getElementById('gps-canvas');
        const ctx = canvas.getContext('2d');
        const logBox = document.getElementById('log-box');
        
        let missionActive = false;
        let routeScanned = false;
        let timeoutId;

        // WAYPOINTS CALIBRADOS (Invertendo a reta final para a esquerda)
        const waypoints = [
            {x: 20, y: 520},   // Entrada
            {x: 400, y: 280},  // Diagonal
            {x: 430, y: 120},  // Topo da curva (suave)
            {x: 620, y: 110},  // Contorno da rocha
            {x: 680, y: 300},  // Descida lateral
            {x: 610, y: 530}   // FINAL: Invertido para a ESQUERDA (estrada lateral)
        ];

        function addLog(text) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerText = `> ${text}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function escanearTrajeto() {
            if(routeScanned) return;
            addLog("Calculando curvas de Bézier para trajeto suave...");
            document.getElementById('btn-scan').disabled = true;
            
            ctx.strokeStyle = "rgba(0, 225, 255, 0.9)";
            ctx.lineWidth = 7;
            ctx.lineCap = "round";
            ctx.setLineDash([10, 10]);
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00e1ff";

            // Desenho arredondado ponto a ponto
            let i = 0;
            const drawInterval = setInterval(() => {
                if (i < waypoints.length - 1) {
                    ctx.beginPath();
                    ctx.moveTo(waypoints[i].x, waypoints[i].y);
                    
                    // Cria o arredondamento usando o ponto atual e o próximo
                    let xc = (waypoints[i].x + waypoints[i + 1].x) / 2;
                    let yc = (waypoints[i].y + waypoints[i + 1].y) / 2;
                    ctx.quadraticCurveTo(waypoints[i].x, waypoints[i].y, xc, yc);
                    ctx.lineTo(waypoints[i+1].x, waypoints[i+1].y);
                    
                    ctx.stroke();
                    i++;
                } else {
                    clearInterval(drawInterval);
                    addLog("Trajeto arredondado com sucesso.");
                    routeScanned = true;
                    document.getElementById('btn-start').disabled = false;
                    document.getElementById('gps-stat').innerText = "ONLINE";
                    document.getElementById('gps-stat').style.color = "var(--neon-green)";
                }
            }, 600);
        }

        function setTractorPosPx(y, x, duration) {
            tractor.style.transition = `all ${duration}s linear`;
            tractor.style.top = y + 'px';
            tractor.style.left = x + 'px';
        }

        function iniciarMissao() {
            if(!routeScanned || missionActive) return;
            missionActive = true;
            document.getElementById('btn-start').disabled = true;
            
            addLog("Trator em modo autônomo. Seguindo curvas...");
            document.getElementById('mode').innerText = "AUTÔNOMO";

            // Sequência de movimentos seguindo os novos pontos
            setTractorPosPx(waypoints[1].y, waypoints[1].x, 4);

            timeoutId = setTimeout(() => {
                if(!missionActive) return;
                setTractorPosPx(waypoints[2].y, waypoints[2].x, 2);
                
                timeoutId = setTimeout(() => {
                    if(!missionActive) return;
                    setTractorPosPx(waypoints[3].y, waypoints[3].x, 2);

                    timeoutId = setTimeout(() => {
                        if(!missionActive) return;
                        addLog("Contorno finalizado. Alinhando à esquerda.");
                        setTractorPosPx(waypoints[4].y, waypoints[4].x, 3);
                        
                        timeoutId = setTimeout(() => {
                            if(!missionActive) return;
                            setTractorPosPx(waypoints[5].y, waypoints[5].x, 3);

                            timeoutId = setTimeout(() => {
                                addLog("Missão Cumprida.");
                                missionActive = false;
                                document.getElementById('mode').innerText = "IDLE";
                            }, 3000);
                        }, 3000);
                    }, 2000);
                }, 2000);
            }, 4000);
        }
    </script>
</body>
</html>
