<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Wallet | Simulador de Créditos</title>
    <style>
        :root {
            --primary: #8b5a2b; 
            --secondary: #556b2f; 
            --bg: #fdf5e6; 
            --text: #3e2723;
            --border: #d7ccc8;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            padding: 20px;
            background: #fff;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .back-btn {
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid var(--primary);
            padding: 5px 15px;
            border-radius: 5px;
        }

        .container {
            max-width: 900px;
            width: 90%;
            padding: 40px 0;
        }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { color: var(--primary); font-size: 2.5rem; margin: 0; }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .panel {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid var(--border);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .result-panel {
            background: #fffdf5;
            border: 3px solid var(--secondary);
            text-align: center;
            min-height: 350px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        .result-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100px; 
            width: 100%;
        }

        .result-value {
            font-size: 3.5rem;
            color: var(--secondary);
            font-weight: bold;
            white-space: nowrap;
            transition: font-size 0.2s ease;
        }

        h3 { border-bottom: 1px solid var(--border); padding-bottom: 10px; color: var(--secondary); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 5px; box-sizing: border-box; }

        .stat-line {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-top: 1px dashed var(--border);
            font-size: 0.9rem;
        }

        #impacto-status { font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn">← VOLTAR AO HUB</a>
        <div style="font-weight: bold; color: var(--secondary);">AGRINHO 2026</div>
    </nav>

    <div class="container">
        <header>
            <h1>Carbon Wallet</h1>
            <p>Simulador de Créditos de Carbono</p>
        </header>

        <div class="calc-grid">
            <div class="panel">
                <h3>Dados da Propriedade</h3>
                <div class="input-group">
                    <label>Hectares Preservados</label>
                    <input type="number" id="ha" placeholder="Ex: 100" oninput="calcular()">
                </div>
                <div class="input-group">
                    <label>Bioma</label>
                    <select id="bioma" onchange="calcular()">
                        <option value="15">Mata Atlântica</option>
                        <option value="12">Amazônia</option>
                        <option value="8">Cerrado</option>
                        <option value="5">Pampas</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Preço CO₂ (USD)</label>
                    <input type="number" id="preco" value="15" oninput="calcular()">
                </div>
            </div>

            <div class="panel result-panel">
                <small>ESTIMATIVA DE GANHO ANUAL</small>
                
                <div class="result-container">
                    <div class="result-value" id="total">R$ 0,00</div>
                </div>
                
                <div class="stat-line">
                    <span>CO₂ Retirado:</span>
                    <strong id="co2">0 t/ano</strong>
                </div>
                <div class="stat-line">
                    <span>Dólar:</span>
                    <strong>R$ 5,25</strong>
                </div>
                <div class="stat-line">
                    <span>Impacto Ambiental:</span>
                    <span id="impacto-status" style="color: #999;">NEUTRO</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calcular() {
            const hectares = document.getElementById('ha').value || 0;
            const absorcao = document.getElementById('bioma').value;
            const precoDolar = document.getElementById('preco').value || 0;
            const cotacaoDolar = 5.25;

            const toneladasTotal = hectares * absorcao;
            const ganhoReal = toneladasTotal * precoDolar * cotacaoDolar;

            const elementoTotal = document.getElementById('total');
            const valorFormatado = ganhoReal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            elementoTotal.innerText = valorFormatado;
            document.getElementById('co2').innerText = toneladasTotal.toLocaleString('pt-BR') + ' t/ano';

            // Lógica do Impacto Ambiental
            const statusImpacto = document.getElementById('impacto-status');
            if (toneladasTotal > 0) {
                statusImpacto.innerText = "POSITIVO";
                statusImpacto.style.color = "var(--secondary)";
            } else {
                statusImpacto.innerText = "NEUTRO";
                statusImpacto.style.color = "#999";
            }

            ajustarFonte(elementoTotal);
        }

        function ajustarFonte(elemento) {
            let fontSize = 3.5; 
            elemento.style.fontSize = fontSize + "rem";

            // Reduz a fonte se o número for muito grande para a largura do quadro
            while (elemento.offsetWidth > 260 && fontSize > 1) {
                fontSize -= 0.2;
                elemento.style.fontSize = fontSize + "rem";
            }
        }
    </script>
</body>
</html>
