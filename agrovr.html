<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SustentaAgro VR | Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=JetBrains+Mono&display=swap');

        body {
            margin: 0;
            background: #050a05;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .hub-container {
            display: flex;
            gap: 30px;
        }

        .card {
            width: 280px;
            height: 380px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: translateY(-15px) scale(1.05);
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 136, 0.2);
        }

        .card i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #00ff88;
        }

        .card h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 0;
            text-align: center;
        }

        .card p {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            padding: 0 20px;
            font-family: 'JetBrains Mono', monospace;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .card:hover::before {
            left: 100%;
        }
    </style>
</head>
<body>

    <h1>SustentaAgro VR Systems</h1>

    <div class="hub-container">
        <a href="drones.html" class="card">
            <i>🛸</i>
            <h2>Monitoramento Drone</h2>
            <p>Voo em tempo real e análise térmica de biomassa.</p>
        </a>

        <a href="autonomos.html" class="card">
            <i>🚜</i>
            <h2>Sistemas Autônomos</h2>
            <p>Gestão de frota robótica e rotas inteligentes GPS.</p>
        </a>

        <a href="#" class="card">
            <i>📊</i>
            <h2>Gestão de Dados</h2>
            <p>Relatórios detalhados e previsão de safra via IA.</p>
        </a>
    </div>

</body>
</html>
