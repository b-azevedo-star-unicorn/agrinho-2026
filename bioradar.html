<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Radar | Marketplace de Resíduos</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 350px;
            background: var(--card);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            z-index: 10;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); cursor: pointer; margin-bottom: 10px; }
        .search-box { background: rgba(0,0,0,0.2); border: 1px solid #334155; padding: 12px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: #334155; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; }
        .tag.active { background: var(--primary); color: #000; font-weight: bold; }

        .offer-list { display: flex; flex-direction: column; gap: 10px; }
        .offer-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; cursor: pointer; border: 1px solid transparent; }
        .offer-item:hover { border-color: var(--primary); }

        /* Mapa */
        .map-area {
            flex-grow: 1;
            position: relative;
            background: #111;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('Gemini_Generated_Image_gfcfcogfcfcogfcf.png'); 
            background-size: cover;
            background-position: center;
        }

        .marker {
            position: absolute;
            width: 24px;
            height: 24px;
            background: var(--primary);
            border: 3px solid white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary);
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        /* Painel de Info */
        .info-panel {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 300px;
            background: var(--card);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--primary);
            display: none; /* Começa escondido */
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .btn-match {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn-match:active { transform: scale(0.98); }

        #modal-aviso {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="modal-aviso">
        <div style="background: var(--card); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid var(--primary); max-width: 400px;">
            <h2>Simulação Bio-Radar</h2>
            <p>Plataforma fictícia para o Concurso Agrinho.</p>
            <button onclick="document.getElementById('modal-aviso').remove(); renderizar();" style="background: var(--primary); border:none; padding: 10px 20px; border-radius: 10px; cursor:pointer; font-weight:bold;">ACESSAR MAPA</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="logo" onclick="resetarMapa()">🔄 Bio-Radar</div>
        <input type="text" id="searchInput" class="search-box" placeholder="Procurar resíduo..." onkeyup="filtrar()">

        <div class="tag-container">
            <span class="tag active" onclick="filtrarCategoria('Todos', this)">Todos</span>
            <span class="tag" onclick="filtrarCategoria('Fertilizante', this)">Fertilizante</span>
            <span class="tag" onclick="filtrarCategoria('Biomassa', this)">Biomassa</span>
        </div>

        <div class="offer-list" id="offerList"></div>
    </aside>

    <main class="map-area" id="mapContainer">
        <div class="info-panel" id="info-panel">
            <h2 id="info-title" style="margin: 0;"></h2>
            <p id="info-farm" style="color: var(--primary); font-weight: bold;"></p>
            <p id="info-desc" style="font-size: 0.9rem; color: #94a3b8;"></p>
            
            <button id="mainMatchBtn" class="btn-match" onclick="executarMatch()">SOLICITAR MATCH</button>
            
            <button onclick="fecharPainel()" style="background:none; border:none; color:#555; cursor:pointer; width:100%; margin-top:10px;">Voltar ao Mapa Geral</button>
        </div>
    </main>

    <script>
        const ofertas = [
            { id: 1, nome: "Cama de Frango", fazenda: "Sítio Santa Maria", cat: "Fertilizante", lat: "40%", lng: "30%", desc: "Rico em nitrogênio para adubação." },
            { id: 2, nome: "Bagaço de Cana", fazenda: "Usina Vale", cat: "Biomassa", lat: "25%", lng: "70%", desc: "Ideal para caldeiras e energia." },
            { id: 3, nome: "Esterco Bovino", fazenda: "Fazenda Horizonte", cat: "Fertilizante", lat: "60%", lng: "50%", desc: "Adubo orgânico curtido." }
        ];

        let categoriaAtual = "Todos";
        let idFocado = null;

        function renderizar(focoId = null) {
            const list = document.getElementById('offerList');
            const map = document.getElementById('mapContainer');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            list.innerHTML = "";
            document.querySelectorAll('.marker').forEach(m => m.remove());

            ofertas.forEach(o => {
                const matchSearch = o.nome.toLowerCase().includes(search);
                const matchCat = categoriaAtual === "Todos" || o.cat === categoriaAtual;

                if (matchSearch && matchCat) {
                    list.innerHTML += `
                        <div class="offer-item" onclick="selecionarPonto(${o.id})">
                            <div style="font-weight:bold">${o.nome}</div>
                            <small>${o.fazenda}</small>
                        </div>
                    `;

                    // Lógica: se tiver um focoId, só mostra ele. Se for null, mostra todos.
                    if (focoId === null || o.id === focoId) {
                        const m = document.createElement('div');
                        m.className = 'marker';
                        m.style.top = o.lat; m.style.left = o.lng;
                        m.onclick = () => selecionarPonto(o.id);
                        map.appendChild(m);
                    }
                }
            });
        }

        function selecionarPonto(id) {
            idFocado = id;
            const o = ofertas.find(item => item.id === id);
            
            // Atualiza painel
            document.getElementById('info-title').innerText = o.nome;
            document.getElementById('info-farm').innerText = o.fazenda;
            document.getElementById('info-desc').innerText = o.desc;
            
            // Reseta o botão de match caso tenha sido usado antes
            const btn = document.getElementById('mainMatchBtn');
            btn.innerText = "SOLICITAR MATCH";
            btn.style.background = "var(--primary)";

            document.getElementById('info-panel').style.display = 'block';
            renderizar(id); // Limpa o mapa e deixa só este
        }

        // FUNÇÃO DE MATCH CORRIGIDA
        function executarMatch() {
            const btn = document.getElementById('mainMatchBtn');
            btn.innerText = "✅ SOLICITADO!";
            btn.style.background = "#fff";
            
            // Simula um tempo de processamento
            setTimeout(() => {
                alert("Match realizado com sucesso! O produtor foi notificado.");
                fecharPainel();
            }, 500);
        }

        function fecharPainel() {
            document.getElementById('info-panel').style.display = 'none';
            idFocado = null;
            renderizar();
        }

        function filtrar() { idFocado = null; renderizar(); }
        
        function filtrarCategoria(cat, el) {
            categoriaAtual = cat;
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            idFocado = null;
            renderizar();
        }

        function resetarMapa() {
            idFocado = null;
            categoriaAtual = "Todos";
            document.getElementById('searchInput').value = "";
            renderizar();
        }
    </script>
</body>
</html>
